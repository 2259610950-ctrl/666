<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学术广场 - 武汉科技大学社区</title>
<link rel="stylesheet" href="style.css">
<script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
<script>
(function(){try{var beacon=new BeaconAction({appkey:'0WEB06U85YBSLJNL',versionCode:'1.0.0',channelID:'share',delay:1000,sessionDuration:30*60*1000,isOversea:false,needReportRqdEvent:false});beacon.onDirectUserAction('preview_page_view',{'url':location.href,'referrer':document.referrer,'title':document.title,'sandbox_id':'86e8fde96b8f4b9ba775ba6d51502ffc'});}catch(e){}})();
</script></head>
<body>
<nav class="navbar" id="navbar"><div class="nav-container"><div class="nav-brand"><div class="brand-icon">武</div><span class="brand-name">武科大社区</span></div><div class="nav-links"><a href="index.html" class="nav-link">首页</a><a href="academic.html" class="nav-link active">学术广场</a><a href="market.html" class="nav-link">二手集市</a><a href="services.html" class="nav-link">帮帮</a><a href="social.html" class="nav-link">社交动态</a><a href="career.html" class="nav-link">职业内推</a><a href="activity.html" class="nav-link">活动约伴</a></div><div class="nav-actions"><button class="btn-icon" id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button><div class="user-menu-wrap"><div class="avatar-wrap" id="navAvatarWrap"><div class="avatar" id="navAvatar" style="cursor:pointer">用</div></div><div class="user-menu" id="userMenu"><div class="user-info-mini"><div class="user-info-name" id="navUserName">加载中</div><div class="user-info-sub" id="navUserSub">武汉科技大学</div></div><div class="user-menu-item" onclick="window.location='profile.html'">个人主页</div><div class="user-menu-divider"></div><div class="user-menu-item danger" onclick="logout()">退出登录</div></div></div></div></nav>
<div class="search-overlay" id="searchOverlay"><div class="search-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="搜索学术帖子..." id="searchInput" autofocus><button onclick="closeSearch()">取消</button></div></div>

<section class="page-hero" style="background:linear-gradient(135deg,#3B82F6 0%,#8B5CF6 100%)">
  <div class="page-hero-inner">
    <h1>学术广场</h1>
    <p>课程笔记共享 · 学科答疑 · 考研经验 · 学习小组</p>
    <div class="page-hero-actions">
      <button class="btn-primary" onclick="openCreatePost('academic')">发帖提问</button>
      <button class="btn-outline" onclick="openCreatePost('academic')">分享笔记</button>
    </div>
  </div>
</section>

<div class="page-container">
  <div class="two-col">
    <div class="feed-main">
      <div class="filter-bar" id="filterBar" style="margin-bottom:16px">
        <span class="filter-label">学院筛选：</span>
        <span class="filter-tag active" data-filter="all">全部</span>
        <span class="filter-tag" data-filter="计算机科学与技术学院">计算机</span>
        <span class="filter-tag" data-filter="材料科学与工程学院">材料冶金</span>
        <span class="filter-tag" data-filter="机械自动化学院">机械工程</span>
        <span class="filter-tag" data-filter="信息科学与工程学院">电子信息</span>
        <span class="filter-tag" data-filter="化学工程与技术学院">化工</span>
        <span class="filter-tag" data-filter="医学院">医学部</span>
        <span class="filter-tag" data-filter="管理学院">经管</span>
        <span class="filter-tag" data-filter="外国语学院">外语</span>
        <span class="filter-tag" data-filter="理学院">理学</span>
        <span class="filter-tag" data-filter="城市建设学院">城建</span>
      </div>

      <div id="academicList"><div style="text-align:center;padding:40px;color:#9CA3AF">加载中...</div></div>
      <button class="load-more-btn" id="loadMoreAcad" onclick="loadMore()">加载更多</button>
    </div>

    <aside>
      <div class="aside-card">
        <p class="aside-title">快速发帖</p>
        <button class="aside-btn" onclick="openCreatePost('academic')">提出问题 / 分享笔记</button>
        <p class="aside-hint">学术讨论、资料共享、组队备考</p>
      </div>
      <div class="aside-card">
        <p class="aside-title">学习达人榜</p>
        <div id="topContributors"></div>
      </div>
      <div class="aside-card">
        <p class="aside-title">热门话题</p>
        <div class="topic-tags" id="hotTopics"></div>
      </div>
    </aside>
  </div>
</div>

<footer class="footer"><div class="footer-container"><div class="footer-brand"><div class="brand-icon sm">武</div><span>武汉科技大学校园社区</span></div><p class="footer-copy">仅限武汉科技大学在校师生使用</p></div></footer>

<button class="fab" onclick="openCreatePost('academic')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<script src="core.js"></script>
<script>
const currentUser = requireAuth();
renderNav('academic.html');
document.getElementById('navAvatarWrap').addEventListener('click', () => document.getElementById('userMenu').classList.toggle('open'));
document.addEventListener('click', e => { if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.remove('open'); });

var acadCount = 5;
var currentFilter = 'all';

// ===== 学院筛选（实际过滤） =====
function initAcademicFilter() {
  document.querySelectorAll('#filterBar .filter-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      document.querySelectorAll('#filterBar .filter-tag').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      acadCount = 5;
      renderAcademicList();
    });
  });
}

function getSubjectColor(college) {
  var c = {'计算机':'#EFF6FF','材料':'#FEF3C7','机械':'#F3E8FF','电子信息':'#E0F2FE','化工':'#FCE7F3','医学':'#FEE2E2','管理':'#D1FAE5','外语':'#FDF2F8','理学':'#F5F3FF','城建':'#FFF7ED'};
  for (var k in c) { if ((college||'').indexOf(k) !== -1) return c[k]; }
  return '#EEF2FF';
}

function getFilteredPosts() {
  var posts = DB.getPosts().filter(function(p) { return p.type === 'academic'; });
  if (currentFilter !== 'all') {
    posts = posts.filter(function(p) { return (p.college||'').indexOf(currentFilter) !== -1; });
  }
  return posts;
}

function renderAcademicList() {
  var posts = getFilteredPosts();
  var listEl = document.getElementById('academicList');
  if (!posts.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:56px 20px"><div style="font-size:48px;margin-bottom:12px;opacity:.4">?</div><p style="font-size:15px;color:#6B7280;margin-bottom:8px">暂无学术帖子</p><p style="font-size:13px;color:#9CA3AF">' + (currentFilter!=='all'?'该学院暂无帖子，试试"全部"' : '来发第一条学术帖子吧！') + '</p><button style="margin-top:16px;padding:10px 24px;border-radius:10px;border:none;background:#4F46E5;color:white;font-size:14px;font-weight:600;cursor:pointer" onclick="openCreatePost(\'academic\')">+ 发布学术帖子</button></div>';
    document.getElementById('loadMoreAcad').style.display = 'none';
    return;
  }
  var toShow = posts.slice(0, acadCount);
  listEl.innerHTML = toShow.map(function(p) {
    var isLiked = currentUser && (p.likedBy||[]).includes(currentUser.stuId);
    var hasImg = p.images && p.images.length > 0;
    var titleText = (p.title || '').trim();
    var contentText = (p.content || '').trim();
    // 防御：标题为空时用内容前50字替代；内容也空时显示默认文案
    var displayTitle = titleText || contentText.slice(0, 50) || '（无标题帖子）';
    var displayContent = contentText || '该帖子暂无详细内容';
    var tagsHtml = (p.tags||[]).map(function(t) { return '<span class="ac-tag">#' + escHtml(t) + '</span>'; }).join('');
    return '<div class="academic-card">' +
      '<div class="ac-header"><div class="ac-subject" style="background:' + getSubjectColor(p.college) + '">?</div><div class="ac-meta">' +
        '<p class="ac-title" onclick="openPostDetail(\'' + p.id + '\')">' + escHtml(displayTitle) + '</p>' +
        '<div class="ac-info"><span class="ac-course">' + (p.college||'综合') + '</span><span class="ac-poster">' + (p.authorName||'匿名') + ' · ' + (p.grade||'') + ' · ' + (p.campus||'') + ' · ' + timeAgo(p.time||p.createdAt) + '</span></div></div></div>' +
      (hasImg ? '<div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding:4px 0">' + p.images.map(function(i){return '<img src="' + i + '" style="width:120px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0" alt="">';}).join('') + '</div>' : '') +
      '<div class="ac-body" onclick="openPostDetail(\'' + p.id + '\')" style="cursor:pointer">' + escHtml(displayContent.slice(0,200)) + (displayContent.length>200?'...':'') + '</div>' +
      '<div class="ac-footer">' + tagsHtml + '<div class="ac-stats">' +
        '<button class="action-btn like-btn-ac ' + (isLiked?'liked':'') + '" data-pid="' + p.id + '">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="' + (isLiked?'currentColor':'none') + '" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="like-count-' + p.id + '">' + (p.likes||0) + '</span></button>' +
        '<span class="ac-stat" style="cursor:pointer" onclick="openPostDetail(\'' + p.id + '\')">? ' + (p.comments||[]).length + '</span>' +
        '<span class="ac-stat">? ' + (p.views||0) + '</span></div></div></div>';
  }).join('');
  document.getElementById('loadMoreAcad').style.display = posts.length > acadCount ? 'block' : 'none';
  document.querySelectorAll('.like-btn-ac').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pid = this.dataset.pid; var r = togglePostLike(pid); if(!r) return;
      this.classList.toggle('liked', r.liked); this.querySelector('path').setAttribute('fill', r.liked?'currentColor':'none');
      this.querySelector('span').textContent = r.count; showToast(r.liked?'已点赞':'取消点赞','info');
    });
  });
}

function loadMore() { acadCount += 5; renderAcademicList(); }

function openCreatePost(type) {
  openModal('<div class="create-post-form"><h3>发布学术帖子</h3><p class="post-sub-info">发布者：' + (currentUser?.name||'') + ' · ' + (currentUser?.major||'') + ' ' + (currentUser?.grade||'') + '</p><div style="margin-bottom:12px"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#6B7280"><span style="color:#DC2626">*</span> 所属校区</label><select id="postCampusSelect" class="post-form-input" style="width:100%;cursor:pointer"><option value="">-- 请选择校区 --</option><option value="青山校区">青山校区</option><option value="黄家湖校区">黄家湖校区</option></select></div><input class="post-form-input" id="newPostTitle" placeholder="标题（如：数据结构期末复习资料整理）"><textarea class="post-form-textarea" id="newPostContent" placeholder="详细描述你的问题或分享内容..." rows="6"></textarea><button class="btn-submit-post" onclick="doPost()">发布</button></div>');
}

function doPost() {
  var t = document.getElementById('newPostTitle').value.trim();
  var c = document.getElementById('newPostContent').value.trim();
  var campus = (document.getElementById('postCampusSelect')?.value || '').trim();
  if (!c) { showToast('请输入内容', 'warn'); return; }
  if (!campus) { showToast('请选择所属校区', 'warn'); return; }
  createPost({ type: 'academic', category: '学术', title: t, content: c, campus: campus });
  closeModal(); renderAcademicList();
  showToast('发布成功！', 'success');
}

// 达人榜
function renderContributors() {
  var posts = DB.getPosts().filter(function(p) { return p.type === 'academic'; });
  var stats = {};
  posts.forEach(function(p) {
    if (!stats[p.authorId]) stats[p.authorId] = { name: p.authorName, bg: p.authorAvatarBg, color: p.authorAvatarColor, txt: p.authorAvatar, count: 0 };
    stats[p.authorId].count++;
  });
  var top = Object.values(stats).sort(function(a,b) { return b.count - a.count; }).slice(0,3);
  document.getElementById('topContributors').innerHTML = top.map(function(u,i) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F3F4F6"><span style="font-weight:700;color:'+['#EF4444','#F59E0B','#6B7280'][i]+';width:16px">'+(i+1)+'</span><div style="width:28px;height:28px;border-radius:50%;background:'+u.bg+';color:'+u.color+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">'+u.txt+'</div><span style="flex:1;font-size:13px">'+u.name+'</span><span style="font-size:12px;color:#9CA3AF">'+u.count+'帖</span></div>';
  }).join('') || '<p style="font-size:13px;color:#9CA3AF;text-align:center;padding:12px">还没有人发帖哦</p>';
}

// 热门话题动态生成
function renderHotTopics() {
  var posts = DB.getPosts().filter(function(p) { return p.type === 'academic'; });
  var tagMap = {};
  posts.forEach(function(p) { (p.tags||[]).forEach(function(t) { tagMap[t] = (tagMap[t]||0)+1; }); });
  var sorted = Object.entries(tagMap).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var colors = ['#EEF2FF:#4F46E5','#F0FDF4:#059669','#FEF9C3:#D97706','#FDF2F8:#EC4899','#FEF2F2:#EF4444','#EFF6FF:#3B82F6','#FDF2FF:#818CF8','#EDE9FE:#059669'];
  var el = document.getElementById('hotTopics');
  if (!sorted.length) { el.innerHTML = '<p style="font-size:13px;color:#9CA3AF;text-align:center;padding:12px">暂无话题标签</p>'; return; }
  el.innerHTML = sorted.map(function(item){ return '<span class="topic-tag" style="background:'+colors[sorted.indexOf(item)%colors.length].split(':')[0]+';color:'+colors[sorted.indexOf(item)%colors.length].split(':')[1]+'">#'+item+'</span>'; }).join('');
}

renderAcademicList();
renderContributors();
renderHotTopics();
initAcademicFilter();
</script>
</body>
</html>
