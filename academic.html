<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学术广场 - 武汉科技大学社区</title>
<link rel="stylesheet" href="style.css">
<script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
<script>
(function(){
  try{
    var beacon=new BeaconAction({
      appkey:'0WEB06U85YBSLJNL',
      versionCode:'1.0.0',
      channelID:'share',
      delay:1000,
      sessionDuration:30*60*1000,
      isOversea:false,
      needReportRqdEvent:false
    });
    beacon.onDirectUserAction('preview_page_view',{
      'url':location.href,
      'referrer':document.referrer,
      'title':document.title,
      'sandbox_id':'86e8fde96b8f4b9ba775ba6d51502ffc'
    });
  }catch(e){}
})();
</script></head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <div class="brand-icon">武</div>
      <span class="brand-name">武科大社区</span>
      <span class="brand-tag" id="navCampusBadge">校区</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">首页</a>
      <a href="academic.html" class="nav-link active">学术广场</a>
      <a href="market.html" class="nav-link">二手集市</a>
      <a href="services.html" class="nav-link">帮帮</a>
      <a href="social.html" class="nav-link">社交动态</a>
      <a href="career.html" class="nav-link">职业内推</a>
      <a href="activity.html" class="nav-link">活动约伴</a>
    </div>
    <div class="nav-actions">
      <div class="nav-weather" id="navWeather"></div>
      <button class="btn-icon" id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      <div class="user-menu-wrap">
        <div class="avatar-wrap" id="navAvatarWrap"><div class="avatar" id="navAvatar" style="cursor:pointer">用</div></div>
        <div class="user-menu" id="userMenu">
          <div class="user-info-mini"><div class="user-info-name" id="navUserName">加载中</div><div class="user-info-sub" id="navUserSub">武汉科技大学</div></div>
          <div class="user-menu-item" onclick="window.location='profile.html'">个人主页</div>
          <div class="user-menu-divider"></div>
          <div class="user-menu-item danger" onclick="logout()">退出登录</div>
        </div>
      </div>
    </div>
  </div>
</nav>
<div class="search-overlay" id="searchOverlay">
  <div class="search-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="搜索学术帖子..." id="searchInput" autofocus><button onclick="closeSearch()">取消</button></div>
</div>

<section class="page-hero" style="background:linear-gradient(135deg,#3B82F6 0%,#8B5CF6 100%)">
  <div class="page-hero-inner">
    <h1>📚 学术广场</h1>
    <p>课程笔记共享 · 学科答疑 · 考研经验 · 学习小组</p>
    <div class="page-hero-actions">
      <button class="btn-primary" onclick="openCreatePost('academic')">✏️ 发帖提问</button>
      <button class="btn-outline" onclick="openCreatePost('academic')">📝 分享笔记</button>
    </div>
  </div>
</section>

<div class="page-container">
  <div class="two-col">
    <div class="feed-main">
      <div class="filter-bar" id="filterBar" style="margin-bottom:16px">
        <span class="filter-label">学院筛选：</span>
        <span class="filter-tag active" data-filter="all">全部</span>
        <span class="filter-tag" data-filter="computer">计算机学院</span>
        <span class="filter-tag" data-filter="material">材料冶金</span>
        <span class="filter-tag" data-filter="mechanical">机械工程</span>
        <span class="filter-tag" data-filter="medical">医学部</span>
        <span class="filter-tag" data-filter="economy">经济管理</span>
      </div>

      <div id="academicList">
        <div style="text-align:center;padding:40px;color:#9CA3AF">加载中...</div>
      </div>
      <button class="load-more-btn" id="loadMoreAcad" onclick="loadMore()">加载更多</button>
    </div>

    <aside>
      <!-- 校区天气 -->
      <div class="aside-card weather-card" id="weatherCard" style="margin-bottom:16px">
        <div class="mi-weather-loading"><div class="mi-weather-spinner"></div><span>正在获取天气…</span></div>
      </div>
      <div class="aside-card" style="margin-bottom:16px">
        <p class="aside-title">快速发帖</p>
        <button style="width:100%;padding:12px;background:#4F46E5;color:white;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:8px" onclick="openCreatePost('academic')">提出问题 / 分享笔记</button>
        <p style="font-size:12px;color:#9CA3AF;text-align:center">学术讨论、资料共享、组队备考</p>
      </div>
      <div class="aside-card" style="margin-bottom:16px">
        <p class="aside-title">学习达人榜</p>
        <div id="topContributors"></div>
      </div>
      <div class="aside-card">
        <p class="aside-title">热门话题</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px" id="hotTopics">
          <span style="padding:5px 12px;background:#EEF2FF;color:#4F46E5;border-radius:20px;font-size:12px;cursor:pointer">#期末复习</span>
          <span style="padding:5px 12px;background:#F0FDF4;color:#059669;border-radius:20px;font-size:12px;cursor:pointer">#考研经验</span>
          <span style="padding:5px 12px;background:#FEF9C3;color:#CA8A04;border-radius:20px;font-size:12px;cursor:pointer">#数据结构</span>
          <span style="padding:5px 12px;background:#FDF2F8;color:#EC4899;border-radius:20px;font-size:12px;cursor:pointer">#英语四六级</span>
          <span style="padding:5px 12px;background:#FEF2F2;color:#EF4444;border-radius:20px;font-size:12px;cursor:pointer">#高等数学</span>
          <span style="padding:5px 12px;background:#EFF6FF;color:#3B82F6;border-radius:20px;font-size:12px;cursor:pointer">#编程学习</span>
        </div>
      </div>
    </aside>
  </div>
</div>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-brand"><div class="brand-icon sm">武</div><span>武汉科技大学校园社区</span></div>
    <p class="footer-copy">仅限武汉科技大学在校师生使用</p>
  </div>
</footer>

<button class="fab" onclick="openCreatePost('academic')">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<script src="core.js"></script>
<script>
const currentUser = requireAuth();
renderNav('academic.html');
renderNavWeather(DB.getCurrentUser()?.campus || '青山校区');
document.getElementById('navAvatarWrap').addEventListener('click', () => document.getElementById('userMenu').classList.toggle('open'));
document.addEventListener('click', e => { if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.remove('open'); });

let acadCount = 5;

function renderAcademicList() {
  const posts = DB.getPosts().filter(p => p.type === 'academic');
  const listEl = document.getElementById('academicList');
  if (!posts.length) { listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF">暂无学术帖子，来发第一条吧！</div>'; return; }
  const toShow = posts.slice(0, acadCount);
  listEl.innerHTML = toShow.map(p => {
    const isLiked = currentUser && (p.likedBy || []).includes(currentUser.stuId);
    return `<div class="academic-card">
      <div class="ac-header">
        <div class="ac-subject" style="background:#EFF6FF">📚</div>
        <div class="ac-meta">
          <p class="ac-title" onclick="openPostDetail('${p.id}')">${escHtml(p.title || p.content.slice(0,40))}</p>
          <div class="ac-info">
            <span class="ac-course">${p.college || '综合'}</span>
            <span class="ac-poster">${p.authorName} · ${p.grade} · ${p.campus} · ${timeAgo(p.time)}</span>
          </div>
        </div>
      </div>
      <div class="ac-body" onclick="openPostDetail('${p.id}')" style="cursor:pointer">${escHtml(p.content.slice(0,150))}${p.content.length > 150 ? '...' : ''}</div>
      <div class="ac-footer">
        <span class="ac-tag">#学术</span>
        <div class="ac-stats">
          <button class="action-btn like-btn-ac ${isLiked ? 'liked' : ''}" data-pid="${p.id}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span class="like-count-${p.id}">${p.likes}</span>
          </button>
          <span class="ac-stat" style="cursor:pointer" onclick="openPostDetail('${p.id}')">💬 ${(p.comments || []).length}</span>
          <span class="ac-stat">👁 ${p.views || 0}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('loadMoreAcad').style.display = posts.length > acadCount ? 'block' : 'none';
  document.querySelectorAll('.like-btn-ac').forEach(btn => {
    btn.addEventListener('click', function() {
      const pid = this.dataset.pid;
      const r = togglePostLike(pid); if (!r) return;
      this.classList.toggle('liked', r.liked);
      this.querySelector('path').setAttribute('fill', r.liked ? 'currentColor' : 'none');
      this.querySelector('span').textContent = r.count;
      showToast(r.liked ? '已点赞' : '取消点赞', 'info');
    });
  });
}

function loadMore() { acadCount += 5; renderAcademicList(); }

function openCreatePost(type) {
  openModal(`
    <div class="create-post-form">
      <h3>发布学术帖子</h3>
      <p class="post-sub-info">发布者：${currentUser?.name} · ${currentUser?.campus} · ${currentUser?.major} ${currentUser?.grade}</p>
      <input class="post-form-input" id="newPostTitle" placeholder="标题（如：数据结构期末复习资料整理）">
      <textarea class="post-form-textarea" id="newPostContent" placeholder="详细描述你的问题或分享内容..." rows="6"></textarea>
      <button class="btn-submit-post" onclick="doPost()">发布</button>
    </div>`);
}

function doPost() {
  const t = document.getElementById('newPostTitle').value.trim();
  const c = document.getElementById('newPostContent').value.trim();
  if (!c) { showToast('请输入内容', 'warn'); return; }
  createPost({ type: 'academic', category: '学术', title: t, content: c });
  closeModal(); renderAcademicList();
  showToast('发布成功！', 'success');
}

// 达人榜
function renderContributors() {
  const posts = DB.getPosts().filter(p => p.type === 'academic');
  const stats = {};
  posts.forEach(p => {
    if (!stats[p.authorId]) stats[p.authorId] = { name: p.authorName, bg: p.authorAvatarBg, color: p.authorAvatarColor, txt: p.authorAvatar, count: 0 };
    stats[p.authorId].count++;
  });
  const top = Object.values(stats).sort((a,b) => b.count - a.count).slice(0,3);
  document.getElementById('topContributors').innerHTML = top.map((u, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F3F4F6">
      <span style="font-weight:700;color:${['#EF4444','#F59E0B','#6B7280'][i]};width:16px">${i+1}</span>
      <div style="width:28px;height:28px;border-radius:50%;background:${u.bg};color:${u.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${u.txt}</div>
      <span style="flex:1;font-size:13px">${u.name}</span>
      <span style="font-size:12px;color:#9CA3AF">${u.count}帖</span>
    </div>`).join('') || '<p style="font-size:13px;color:#9CA3AF;text-align:center;padding:12px">还没有人发帖哦</p>';
}

renderAcademicList();
renderContributors();
initFilterTags();
renderWeatherCard(DB.getCurrentUser()?.campus || '青山校区');
</script>
</body>
</html>
