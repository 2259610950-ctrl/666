</div>

<section class="page-hero" style="background:linear-gradient(135deg,#F59E0B 0%,#EF4444 50%,#F97316 100%);position:relative;overflow:hidden">
  <div style="position:absolute;top:-50%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%);border-radius:50%;pointer-events:none"></div>
  <div class="page-hero-inner" style="position:relative;z-index:1">

    <p>校友内推直通车 · 简历互改 · 面试经验分享 · 校招信息汇总</p>
    <div class="page-hero-actions">
      <button class="btn-primary" onclick="openCareerModal()">📤 发布内推</button>

    </div>
  </div>
</section>

<div class="page-container">
  <div class="two-col">
    <div>
      <div class="feed-tabs" style="margin-bottom:16px">
        <button class="tab-btn active" onclick="switchCareerTab(this,'all')">全部</button>
        <button class="tab-btn" onclick="switchCareerTab(this,'intern')">暑期实习</button>
        <button class="tab-btn" onclick="switchCareerTab(this,'campus')">校园招聘</button>
        <button class="tab-btn" onclick="switchCareerTab(this,'resume')">简历互改</button>
      </div>
      <div id="careerList"></div>
      <button class="load-more-btn" id="loadMoreCareer" onclick="loadMoreCareer()">加载更多</button>
    </div>
    <aside>
<div class="aside-card" style="margin-bottom:16px">
        <p class="aside-title">内推数据</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div style="text-align:center;padding:12px;background:#FFFBEB;border-radius:10px">
            <div style="font-size:24px;font-weight:700;color:#F59E0B" id="totalReferral">—</div>
            <div style="font-size:12px;color:#6B7280">内推信息</div>
          </div>
          <div style="text-align:center;padding:12px;background:#FEF2F2;border-radius:10px">
            <div style="font-size:24px;font-weight:700;color:#EF4444">🔥</div>
            <div style="font-size:12px;color:#6B7280">秋招进行中</div>
          </div>
        </div>
      </div>
      <div class="aside-card" style="margin-bottom:16px">
        <p class="aside-title">热门企业</p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;padding:6px 0"><span style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">武</span> 武汢集团</div>
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;padding:6px 0"><span style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#e60012,#c1001e);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">华</span> 华为技术</div>
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;padding:6px 0"><span style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#0078d4,#106ebe);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">字</span> 字节跳动</div>
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;padding:6px 0"><span style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#00b96b,#00a85a);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">腾</span> 腾讯科技</div>
        </div>
      </div>
      <div class="aside-card">
        <p class="aside-title">求职提示</p>
        <div style="font-size:13px;color:#6B7280;line-height:1.9">
          📌 关注招聘截止时间<br>
          📌 准备好中英文简历<br>
          📌 内推通道速度更快<br>
          📌 善用校友资源网络
        </div>
      </div>
    </aside>
  </div>
</div>

<footer class="footer"><div class="footer-container"><div class="footer-brand"><div class="brand-icon sm">武</div><span>武汉科技大学校园社区</span></div><p class="footer-copy">仅限武汉科技大学在校师生使用</p></div></footer>
<button class="fab" onclick="openCareerModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<script src="core.js"></script>
<script>
const currentUser = requireAuth();
renderNav('career.html');
renderNavWeather(DB.getCurrentUser()?.campus || '青山校区');
document.getElementById('navAvatarWrap').addEventListener('click', () => document.getElementById('userMenu').classList.toggle('open'));
document.addEventListener('click', e => { if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.remove('open'); });

let careerCount = 8;
let careerTab = 'all';

function switchCareerTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); careerTab = tab; careerCount = 8; renderCareerList();
}

function renderCareerList() {
  const posts = DB.getPosts().filter(p => p.type === 'career');
  document.getElementById('totalReferral').textContent = posts.length;
  const listEl = document.getElementById('careerList');
  if (!posts.length) { listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF">暂无内推信息，来发布第一条！</div>'; return; }
  const toShow = posts.slice(0, careerCount);
  listEl.innerHTML = toShow.map(p => {
    const isLiked = currentUser && (p.likedBy || []).includes(currentUser.stuId);
    return `<div class="career-item">
      <div class="ci-header">
        <div class="ci-logo" style="background:linear-gradient(135deg,#667eea,#764ba2)">${p.company ? p.company.charAt(0) : '职'}</div>
        <div class="ci-main">
          <div class="ci-title">${escHtml(p.title || p.company || '职位招聘')}</div>
          <div class="ci-company">${escHtml(p.company || '')} ${p.position ? '· ' + p.position : ''}</div>
        </div>
        <span class="ci-badge badge-hot">内推</span>
      </div>
      <div style="font-size:13px;color:#6B7280;margin-bottom:12px;line-height:1.6">${escHtml(p.content.slice(0, 120))}${p.content.length > 120 ? '...' : ''}</div>
      <div class="ci-footer">
        <div class="ci-referrer">
          <div class="ci-referrer-avatar" style="background:${p.authorAvatarBg};color:${p.authorAvatarColor}">${p.authorAvatar}</div>
          ${p.authorName} · ${p.campus} · ${timeAgo(p.time)}
        </div>
        <div style="display:flex;gap:8px">
          <button class="action-btn car-like ${isLiked ? 'liked' : ''}" data-pid="${p.id}" style="font-size:12px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span>${p.likes}</span>
          </button>
          <button class="ci-apply" onclick="openPostDetail('${p.id}')">查看详情</button>
          <button class="ci-apply" onclick="applyReferral('${p.id}')">申请内推</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('loadMoreCareer').style.display = posts.length > careerCount ? 'block' : 'none';
  document.querySelectorAll('.car-like').forEach(btn => {
    btn.addEventListener('click', function() {
      const r = togglePostLike(this.dataset.pid); if (!r) return;
      this.classList.toggle('liked', r.liked);
      this.querySelector('path').setAttribute('fill', r.liked ? 'currentColor' : 'none');
      this.querySelector('span').textContent = r.count;
    });
  });
}

function loadMoreCareer() { careerCount += 8; renderCareerList(); }

function applyReferral(postId) {
  openModal(`<div class="create-post-form">
    <h3>申请内推</h3>
    <p class="post-sub-info">申请人：${currentUser?.name} · ${currentUser?.major} ${currentUser?.grade}</p>
    <textarea class="post-form-textarea" id="applyNote" placeholder="附言（可介绍自己的背景、优势）..." rows="4"></textarea>
    <button class="btn-submit-post" onclick="submitApply()">确认申请</button>
  </div>`);
}

function submitApply() {
  closeModal(); showToast('内推申请已发送，请等待对方回复 ✅', 'success');
}

function openCareerModal() {
  openModal(`<div class="create-post-form">
    <h3>发布内推信息</h3>
    <p class="post-sub-info">发布者：${currentUser?.name} · ${currentUser?.campus}</p>
    <div class="post-form-row">
      <input class="post-form-input" id="cCo" placeholder="公司名称">
      <input class="post-form-input" id="cPos" placeholder="职位名称">
    </div>
    <textarea class="post-form-textarea" id="cContent" placeholder="职位详情、要求、内推方式..." rows="5"></textarea>
    <button class="btn-submit-post" onclick="doCareer()">发布</button>
  </div>`);
}

function doCareer() {
  const co = document.getElementById('cCo').value.trim();
  const pos = document.getElementById('cPos').value.trim();
  const c = document.getElementById('cContent').value.trim();
  if (!c) { showToast('请填写内容', 'warn'); return; }
  createPost({ type: 'career', category: '内推', title: co + (pos ? ' - ' + pos : ''), company: co, position: pos, content: c });
  closeModal(); renderCareerList(); showToast('发布成功！', 'success');
}

function openResumeModal() {
  openModal(`<div class="create-post-form">
    <h3>简历互改</h3>
    <p class="post-sub-info">发布者：${currentUser?.name} · ${currentUser?.major}</p>
    <textarea class="post-form-textarea" id="rContent" placeholder="描述你的求职方向和希望得到的反馈..." rows="5"></textarea>
    <button class="btn-submit-post" onclick="doResume()">发布简历互改请求</button>
  </div>`);
}

function doResume() {
  const c = document.getElementById('rContent').value.trim();
  if (!c) { showToast('请填写内容', 'warn'); return; }
  createPost({ type: 'career', category: '内推', title: '【简历互改】' + currentUser?.major, content: c });
  closeModal(); renderCareerList(); showToast('发布成功！', 'success');
}

renderCareerList();
</script>
</body>
</html>
