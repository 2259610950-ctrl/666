<script>
// ============================================================
// 认证 & 导航初始化
// ============================================================
var currentUser = requireAuth();
renderNav('profile.html');

// 用户菜单交互
(function() {
  var wrap = document.getElementById('navAvatarWrap');
  if (wrap) {
    wrap.addEventListener('click', function() {
      document.getElementById('userMenu').classList.toggle('open');
    });
  }
  document.addEventListener('click', function(e) {
    var menu = document.getElementById('userMenu');
    var avatarWrap = document.getElementById('navAvatarWrap');
    if (menu && avatarWrap && !avatarWrap.contains(e.target) && !menu.contains(e.target)) {
    menu.classList.remove('open');
    }
  });
})();

// 更新菜单用户信息
var menuName = document.getElementById('menuName');
var menuSub = document.getElementById('menuSub');
if (menuName) menuName.textContent = currentUser.name;
if (menuSub) menuSub.textContent = (currentUser.college || '') + ' · ' + (currentUser.grade || '');

// ============================================================
// 状态管理
// ============================================================
var originalData = {};   // 加载时的原始数据（用于对比是否修改）
var formData = {};       // 当前表单数据
var isDirty = false;     // 是否有未保存修改
var avatarDataUrl = null; // 裁剪后的头像 dataURL
var avatarBgColor = '';
var avatarFgColor = '';

// ============================================================
// 加载表单数据
// ============================================================
function loadFormData() {
  var users = DB.getUsers();
  var u = users[currentUser.stuId] || currentUser;

  formData = {
    name: u.name || '',
    bio: u.bio || '',
    phone: u.phone || '',
    email: u.email || '',
    qq: u.qq || '',
    wechat: u.wechat || ''
  };

  avatarDataUrl = u.avatarDataUrl || null;
  avatarBgColor = u.avatarBg || '#4F46E5';
  avatarFgColor = u.avatarColor || '#FFFFFF';

  // 保存原始副本
  originalData = JSON.parse(JSON.stringify(formData));
  originalData.avatarDataUrl = avatarDataUrl;

  // 填充表单
  document.getElementById('editName').value = formData.name;
  document.getElementById('editBio').value = formData.bio;
  document.getElementById('editPhone').value = formData.phone;
  document.getElementById('editEmail').value = formData.email;
  document.getElementById('editQQ').value = formData.qq;
  document.getElementById('editWechat').value = formData.wechat;

  updateCharCounts();
  updateAvatarPreview();
  updateLivePreview();
  clearAllErrors();
  isDirty = false;
  updateDirtyIndicator();
}

// ============================================================
// 实时校验
// ============================================================
var validators = {
  name: function(val) {
    if (!val.trim()) return '昵称不能为空';
    if (val.trim().length < 2) return '昵称至少需要2个字符';
    if (val.trim().length > 12) return '昵称最长12个字符';
    return '';
  },
  bio: function(val) {
    if (val.length > 200) return '简介最长200字';
    return '';
  },
  phone: function(val) {
    if (!val) return '';
    if (!/^1[3-9]\d{9}$/.test(val)) return '手机号格式不正确（11位数字）';
    return '';
  },
  email: function(val) {
    if (!val) return '';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return '邮箱格式不正确';
    return '';
  },
  qq: function(val) {
    if (!val) return '';
    if (!/^\d{5,11}$/.test(val)) return 'QQ号格式不正确（5-11位数字）';
    return '';
  },
  wechat: function(val) {
    if (!val) return '';
    if (!/^[a-zA-Z][a-zA-Z0-9_-]{5,19}$/.test(val)) return '微信号格式不正确（字母开头，6-20位）';
    return '';
  }
};

function validateField(fieldId) {
  var val = document.getElementById(fieldId).value;
  var key = fieldId.replace('edit', '').toLowerCase();
  var fn = validators[key];
  if (!fn) return '';
  return fn(val);
}

function showFieldError(fieldId, msg) {
  var input = document.getElementById(fieldId);
  var key = fieldId.replace('edit', '').toLowerCase();
  var errorEl = document.getElementById(key + 'Error');
  if (input) {
    input.classList.toggle('error', !!msg);
    input.classList.toggle('success', !msg && input.value.trim() !== '');
  }
  if (errorEl) {
    errorEl.textContent = msg || '';
    errorEl.style.opacity = msg ? '1' : '0';
  }
}

function clearAllErrors() {
  ['editName','editBio','editPhone','editEmail','editQQ','editWechat'].forEach(function(id) {
    showFieldError(id, '');
  });
}

function checkDirty() {
  var nameVal = document.getElementById('editName').value.trim();
  var bioVal = document.getElementById('editBio').value.trim();
  var phoneVal = document.getElementById('editPhone').value.trim();
  var emailVal = document.getElementById('editEmail').value.trim();
  var qqVal = document.getElementById('editQQ').value.trim();
  var wechatVal = document.getElementById('editWechat').value.trim();

  isDirty = (
    nameVal !== originalData.name ||
    bioVal !== originalData.bio ||
    phoneVal !== originalData.phone ||
    emailVal !== originalData.email ||
    qqVal !== originalData.qq ||
    wechatVal !== originalData.wechat ||
    avatarDataUrl !== originalData.avatarDataUrl
  );
  updateDirtyIndicator();
}

function updateDirtyIndicator() {
  var el = document.getElementById('dirtyIndicator');
  el.style.display = isDirty ? 'inline-flex' : 'none';
  // 更新保存按钮状态
  var saveBtn = document.getElementById('btnSave');
  if (saveBtn) {
    saveBtn.disabled = !isDirty;
    saveBtn.style.opacity = isDirty ? '1' : '0.6';
  }
}

function updateCharCounts() {
  var nameLen = document.getElementById('editName').value.trim().length;
  var bioLen = document.getElementById('editBio').value.length;
  var nameEl = document.getElementById('nameCharCount');
  var bioEl = document.getElementById('bioCharCount');
  nameEl.textContent = nameLen + '/12';
  bioEl.textContent = bioLen + '/200';
  nameEl.classList.toggle('warn', nameLen > 12 || (nameLen > 0 && nameLen < 2));
  bioEl.classList.toggle('warn', bioLen > 180);
}

// ============================================================
// 头像系统
// ============================================================
function openAvatarCrop() {
  document.getElementById('avatarFileInput').click();
}

function handleAvatarFileSelect(e) {
  var file = e.target.files[0];
  if (!file) return;

  if (!file.type.match(/^image\//)) {
    showToast('请选择图片文件', 'error');
    return;
  }
  if (file.size > 10 * 1024 * 1024) {
    showToast('图片不能超过10MB', 'error');
    return;
  }

  var reader = new FileReader();
  reader.onload = function(ev) {
    showCropModal(ev.target.result);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function showCropModal(imageSrc) {
  var img = new Image();
  img.onload = function() {
    var cropSize = 240;
    var canvasW = 300;
    var canvasH = 360;
    var outputSize = 200;

    var minScale = Math.max(cropSize / img.naturalWidth, cropSize / img.naturalHeight);
    var scale = minScale;
    var maxScale = minScale * 4;

    var offsetX = (canvasW - img.naturalWidth * scale) / 2;
    var offsetY = (canvasH - img.naturalHeight * scale) / 2;

    var dragging = false;
    var dragStartX = 0, dragStartY = 0;
    var startOffsetX = 0, startOffsetY = 0;

    var circleCX = canvasW / 2;
    var circleCY = canvasH / 2;

    function drawCanvas() {
      var canvas = document.getElementById('cropCanvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvasW, canvasH);

      // 深色背景
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvasW, canvasH);

      // 裁剪圆内绘制图片
      ctx.save();
      ctx.beginPath();
      ctx.arc(circleCX, circleCY, cropSize / 2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(img, offsetX, offsetY, img.naturalWidth * scale, img.naturalHeight * scale);
      ctx.restore();

      // 圆形虚线边框
      ctx.beginPath();
      ctx.arc(circleCX, circleCY, cropSize / 2, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // 十字参考线
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(circleCX, circleCY - cropSize / 2);
      ctx.lineTo(circleCX, circleCY + cropSize / 2);
      ctx.moveTo(circleCX - cropSize / 2, circleCY);
      ctx.lineTo(circleCX + cropSize / 2, circleCY);
      ctx.stroke();
    }

    var cropHTML = '<div class="crop-modal-content">' +
      '<div class="crop-header">' +
        '<h3>裁剪头像</h3>' +
        '<button style="width:28px;height:28px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:14px" onclick="closeModal()">✕</button>' +
      '</div>' +
      '<div class="crop-area-wrap" id="cropArea">' +
        '<canvas class="crop-canvas" id="cropCanvas" width="' + canvasW + '" height="' + canvasH + '"></canvas>' +
      '</div>' +
      '<div class="crop-controls">' +
        '<span class="crop-zoom-label">缩放</span>' +
        '<input type="range" class="crop-zoom-slider" id="cropZoom" min="' + Math.round(minScale * 100) / 100 + '" max="' + Math.round(maxScale * 100) / 100 + '" step="0.01" value="' + scale + '">' +
      '</div>' +
      '<div class="crop-actions">' +
        '<button class="btn-crop-cancel" onclick="closeModal()">取消</button>' +
        '<button class="btn-crop-confirm tap-active" onclick="confirmCrop()">确认裁剪</button>' +
      '</div>' +
    '</div>';

    openModal(cropHTML);

    // 绑定事件
    setTimeout(function() {
      var canvas = document.getElementById('cropCanvas');
      var zoomSlider = document.getElementById('cropZoom');
      if (!canvas) return;
      drawCanvas();

      // 鼠标拖拽
      canvas.addEventListener('mousedown', function(e) {
        dragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        startOffsetX = offsetX;
        startOffsetY = offsetY;
        canvas.style.cursor = 'grabbing';
        e.preventDefault();
      });

      var moveHandler = function(e) {
        if (!dragging) return;
        var dx = e.clientX - dragStartX;
        var dy = e.clientY - dragStartY;
        offsetX = startOffsetX + dx;
        offsetY = startOffsetY + dy;
        drawCanvas();
      };

      var upHandler = function() {
        if (dragging) {
          dragging = false;
          var c = document.getElementById('cropCanvas');
          if (c) c.style.cursor = 'grab';
        }
      };

      document.addEventListener('mousemove', moveHandler);
      document.addEventListener('mouseup', upHandler);

      // 触摸事件
      canvas.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
          dragging = true;
          dragStartX = e.touches[0].clientX;
          dragStartY = e.touches[0].clientY;
          startOffsetX = offsetX;
          startOffsetY = offsetY;
          e.preventDefault();
        }
      }, { passive: false });

      canvas.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        var dx = e.touches[0].clientX - dragStartX;
        var dy = e.touches[0].clientY - dragStartY;
        offsetX = startOffsetX + dx;
        offsetY = startOffsetY + dy;
        drawCanvas();
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchend', function() { dragging = false; });

      // 缩放滑块
      zoomSlider.addEventListener('input', function() {
        scale = parseFloat(this.value);
        offsetX = circleCX - img.naturalWidth * scale / 2;
        offsetY = circleCY - img.naturalHeight * scale / 2;
        drawCanvas();
      });

      // 滚轮缩放
      canvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        var oldScale = scale;
        var delta = e.deltaY > 0 ? -0.05 : 0.05;
        var newScale = Math.max(minScale, Math.min(maxScale, scale + delta));
        if (newScale !== oldScale) {
          // 以鼠标位置为缩放中心
          var rect = canvas.getBoundingClientRect();
          var mx = e.clientX - rect.left;
          var my = e.clientY - rect.top;
          var ratio = newScale / oldScale;
          offsetX = mx - (mx - offsetX) * ratio;
          offsetY = my - (my - offsetY) * ratio;
          scale = newScale;
          zoomSlider.value = scale;
          drawCanvas();
        }
      }, { passive: false });

      // 存储 crop 参数到闭包外
      window._cropParams = {
        img: img,
        getScale: function() { return scale; },
        getOffsetX: function() { return offsetX; },
        getOffsetY: function() { return offsetY; },
        getCircleCX: function() { return circleCX; },
        getCircleCY: function() { return circleCY; },
        getCropSize: function() { return cropSize; },
        getOutputSize: function() { return outputSize; }
      };
    }, 100);
  };
  img.src = imageSrc;
}

function confirmCrop() {
  var params = window._cropParams;
  if (!params) return;

  var scale = params.getScale();
  var offsetX = params.getOffsetX();
  var offsetY = params.getOffsetY();
  var circleCX = params.getCircleCX();
  var circleCY = params.getCircleCY();
  var cropSize = params.getCropSize();
  var outputSize = params.getOutputSize();
  var img = params.img;

  var cropX = circleCX - cropSize / 2;
  var cropY = circleCY - cropSize / 2;

  var scaleFactorX = img.naturalWidth / (img.naturalWidth * scale);
  var scaleFactorY = img.naturalHeight / (img.naturalHeight * scale);
  var srcCropX = (cropX - offsetX) * scaleFactorX;
  var srcCropY = (cropY - offsetY) * scaleFactorY;
  var srcCropW = cropSize * scaleFactorX;
  var srcCropH = cropSize * scaleFactorY;

  var cvs = document.createElement('canvas');
  cvs.width = outputSize;
  cvs.height = outputSize;
  var ctx = cvs.getContext('2d');

  ctx.beginPath();
  ctx.arc(outputSize / 2, outputSize / 2, outputSize / 2, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(img, srcCropX, srcCropY, srcCropW, srcCropH, 0, 0, outputSize, outputSize);

  avatarDataUrl = cvs.toDataURL('image/jpeg', 0.85);

  closeModal();
  updateAvatarPreview();
  updateLivePreview();
  checkDirty();
  showToast('头像已更新，点击保存生效', 'info');
  delete window._cropParams;
}

// 保存
// ============================================================
function handleSave() {
  // 校验所有字段
  var errors = {};
  var hasError = false;
  ['editName','editBio','editPhone','editEmail','editQQ','editWechat'].forEach(function(id) {
    var err = validateField(id);
    showFieldError(id, err);
    if (err) hasError = true;
  });

  if (hasError) {
    showSaveStatus('error', '请修正表单中的错误后重试');
    var firstErr = document.querySelector('.edit-input.error, .edit-textarea.error');
    if (firstErr) firstErr.focus();
    // 滚动到错误处
    if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // 构建更新数据
  var updates = {
    name: document.getElementById('editName').value.trim(),
    bio: document.getElementById('editBio').value.trim(),
    phone: document.getElementById('editPhone').value.trim(),
    email: document.getElementById('editEmail').value.trim(),
    qq: document.getElementById('editQQ').value.trim(),
    wechat: document.getElementById('editWechat').value.trim()
  };

  if (avatarDataUrl) {
    updates.avatarDataUrl = avatarDataUrl;
    updates.avatarBg = 'transparent';
  }

  showSaveStatus('saving', '正在保存...');

  // 模拟短暂延迟让用户看到保存状态
  setTimeout(function() {
    var result = updateUserProfile(currentUser.stuId, updates);

    if (result.success) {
      currentUser = result.user;
      localStorage.setItem('wkust_currentUser', currentUser.stuId);

      originalData = {
        name: currentUser.name || '',
        bio: currentUser.bio || '',
        phone: currentUser.phone || '',
        email: currentUser.email || '',
        qq: currentUser.qq || '',
        wechat: currentUser.wechat || ''
      };
      originalData.avatarDataUrl = avatarDataUrl;

      isDirty = false;
      updateDirtyIndicator();

      showSaveStatus('success', '✅ 保存成功！');

      // 刷新页面信息
      renderProfileInfo();
      renderNav('profile.html');

      // 更新菜单
      var mn = document.getElementById('menuName');
      var ms = document.getElementById('menuSub');
      if (mn) mn.textContent = currentUser.name;
      if (ms) ms.textContent = (currentUser.college || '') + ' · ' + (currentUser.grade || '');

      setTimeout(function() { clearSaveStatus(); }, 2500);
    } else {
      showSaveStatus('error', result.error || '保存失败，请重试');
      setTimeout(function() { clearSaveStatus(); }, 3500);
    }
  }, 400);
}

  if (!isDirty) {

  var items;
  if (profileTab === 'posts') {
    items = posts.filter(function(p) { return p.authorId === currentUser.stuId; });
  } else if (profileTab === 'comments') {
    items = [];
    posts.forEach(function(p) {
      (p.comments || []).filter(function(c) { return c.authorId === currentUser.stuId; }).forEach(function(c) {
        items.push({ postTitle: p.title || p.content.slice(0, 30), postId: p.id, content: c.content, time: c.time });
      });
    });
  } else {
    items = posts.filter(function(p) { return (p.likedBy || []).includes(currentUser.stuId); });
  }

  var listEl = document.getElementById('profileContent');
  if (!items.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF"><div style="font-size:48px;margin-bottom:12px">📭</div><p style="font-size:15px;margin-bottom:8px">暂无内容</p><p style="font-size:13px">快去发布你的第一条动态吧！</p></div>';
    return;
  }

  if (profileTab === 'comments') {
    listEl.innerHTML = items.map(function(c) {
      return '<div style="background:white;border-radius:12px;padding:16px;border:1px solid #E5E7EB;margin-bottom:10px;cursor:pointer" onclick="openPostDetail(\'' + c.postId + '\')">' +
        '<div style="font-size:12px;color:#9CA3AF;margin-bottom:6px">评论于：' + escHtml(c.postTitle) + '</div>' +
        '<p style="font-size:14px;color:#374151">' + escHtml(c.content) + '</p>' +
        '<div style="font-size:12px;color:#9CA3AF;margin-top:6px">' + timeAgo(c.time) + '</div></div>';
    }).join('');
  } else {
    listEl.innerHTML = items.map(function(post) {
      var isLiked = (post.likedBy || []).includes(currentUser.stuId);
      return '<div class="post-card">' +
        '<div class="post-header">' +
          '<div class="post-avatar" style="background:' + post.authorAvatarBg + ';color:' + post.authorAvatarColor + '">' + post.authorAvatar + '</div>' +
          '<div class="post-meta"><span class="post-author">' + post.authorName + '</span><span class="post-badge ' + post.type + '">' + post.category + '</span><span class="post-time">' + timeAgo(post.time) + '</span></div>' +
        '</div>' +
        '<div class="post-body" onclick="openPostDetail(\'' + post.id + '\')" style="cursor:pointer">' +
          (post.title ? '<p class="post-title">' + escHtml(post.title) + '</p>' : '') +
          '<p>' + escHtml(post.content.slice(0, 100)) + (post.content.length > 100 ? '...' : '') + '</p>' +
        '</div>' +
        '<div class="post-actions">' +
          '<button class="action-btn ' + (isLiked ? 'liked' : '') + '" onclick="profileLike(this,\'' + post.id + '\')">' +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="' + (isLiked ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
            '<span>' + (post.likes || 0) + '</span></button>' +
          '<button class="action-btn" onclick="openPostDetail(\'' + post.id + '\')">💬 ' + ((post.comments || []).length) + '</button>' +
          (profileTab === 'posts' ? '<button class="action-btn" style="margin-left:auto;color:#EF4444" onclick="handleDeletePost(\'' + post.id + '\')">🗑️ 删除</button>' : '') +
        '</div></div>';
    }).join('');
  }
}

function profileLike(btn, postId) {
  var r = togglePostLike(postId);
  if (!r) return;
  btn.classList.toggle('liked', r.liked);
  btn.querySelector('path').setAttribute('fill', r.liked ? 'currentColor' : 'none');
  btn.querySelector('span').textContent = r.count;
  showToast(r.liked ? '已点赞' : '取消点赞', 'info');
}

function handleDeletePost(postId) {
  showConfirmDialog(
    '删除帖子？',
    '删除后不可恢复，确定要继续吗？',
    '删除',
    '取消',
    function() {
      var filtered = DB.getPosts().filter(function(p) { return p.id !== postId; });
      DB.set('posts', filtered);
      renderProfileContent();
      renderProfileInfo();
      showToast('帖子已删除', 'info');
    }
  );
}

// ============================================================
// 启动
// ============================================================
loadFormData();
renderProfileInfo();
renderProfileContent();
updateLivePreview();
</script>
</body>
</html>
