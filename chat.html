<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私信 - 武科大社区</title>
<link rel="stylesheet" href="style.css">
<script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
<script>
(function(){
  try{
    var beacon=new BeaconAction({
      appkey:'0WEB06U85YBSLJNL',
      versionCode:'1.0.0',
      channelID:'share',
      delay:1000,
      sessionDuration:30*60*1000,
      isOversea:false,
      needReportRqdEvent:false
    });
    beacon.onDirectUserAction('preview_page_view',{
      'url':location.href,
      'referrer':document.referrer,
      'title':document.title,
      'sandbox_id':'86e8fde96b8f4b9ba775ba6d51502ffc'
    });
  }catch(e){}
})();
</script></head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <div class="brand-icon">武</div>
      <span class="brand-name">武科大社区</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">首页</a>
      <a href="academic.html" class="nav-link">学术广场</a>
      <a href="market.html" class="nav-link">二手集市</a>
      <a href="services.html" class="nav-link">帮帮</a>
      <a href="social.html" class="nav-link">社交动态</a>
      <a href="career.html" class="nav-link">职业内推</a>
      <a href="activity.html" class="nav-link">活动约伴</a>
    </div>
    <div class="nav-actions">
      <div class="nav-weather" id="navWeather"></div>
      <button class="btn-icon" id="searchBtn" title="搜索">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <div class="user-menu-wrap">
        <div class="avatar-wrap" id="navAvatarWrap">
          <div class="avatar" id="navAvatar" style="background:#4F46E5;color:white;cursor:pointer">用</div>
        </div>
        <div class="user-menu" id="userMenu">
          <div class="user-info-mini">
            <div class="user-info-name" id="navUserName">加载中</div>
            <div class="user-info-sub" id="navUserSub">武汉科技大学</div>
          </div>
          <div class="user-menu-item" onclick="window.location='profile.html'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            个人主页
          </div>
          <div class="user-menu-divider"></div>
          <div class="user-menu-item danger" onclick="logout()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            退出登录
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="搜索帖子、商品、活动、同学..." id="searchInput" autofocus>
    <button onclick="closeSearch()">取消</button>
  </div>
  <div class="search-hot">
    <p class="hot-label">搜索同学</p>
    <div class="hot-tags">
      <span onclick="fillSearch(this)">李思远</span>
      <span onclick="fillSearch(this)">陈梓涵</span>
      <span onclick="fillSearch(this)">王晓琳</span>
    </div>
  </div>
</div>

<div class="chat-page">
  <!-- 会话列表 -->
  <div class="chat-sidebar" id="chatSidebar">
    <div class="chat-sidebar-header">
      <h2>私信</h2>
      <button class="btn-new-chat" id="btnNewChat" onclick="showNewChatSearch()" title="新建私信">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <!-- 搜索新联系人 -->
    <div class="chat-user-search" id="chatUserSearch" style="display:none">
      <div class="chat-user-search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="newChatSearchInput" placeholder="搜索同学姓名或学号..." oninput="renderUserSearch()">
        <button onclick="hideNewChatSearch()">✕</button>
      </div>
      <div class="chat-user-results" id="chatUserResults"></div>
    </div>
    <div class="chat-conv-list" id="convList">
      <div style="text-align:center;padding:40px 20px;color:#9CA3AF">加载会话中...</div>
    </div>
  </div>

  <!-- 聊天区域 -->
  <div class="chat-main" id="chatMain">
    <div class="chat-empty-state" id="chatEmptyState">
      <div class="chat-empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h3>选择一段对话</h3>
      <p>从左侧选择一个会话，或发起新的私信</p>
      <button class="btn-start-chat" onclick="showNewChatSearch()">发起新私信</button>
    </div>
    <div class="chat-active" id="chatActive" style="display:none">
      <div class="chat-active-header" id="chatActiveHeader"></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-bar" id="chatInputBar">
        <textarea id="chatInput" placeholder="输入消息..." rows="1" onkeydown="handleChatKey(event)"></textarea>
        <button class="btn-send-msg" onclick="sendChatMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="core.js"></script>
<script>
var currentUser = requireAuth();
renderNav('chat.html');
renderNavWeather(DB.getCurrentUser()?.campus || '青山校区');

// 导航事件
var navAvatarWrap = document.getElementById('navAvatarWrap');
navAvatarWrap.addEventListener('click', function() {
  document.getElementById('userMenu').classList.toggle('open');
});
document.addEventListener('click', function(e) {
  if (!navAvatarWrap.contains(e.target)) document.getElementById('userMenu').classList.remove('open');
});

// 更新用户信息
if (currentUser) {
  document.getElementById('navUserSub').textContent = currentUser.major + ' · ' + currentUser.grade;
}

// 当前聊天对象
var activePartnerId = null;
var activePartner = null;

// 初始化渲染
renderConvList();

// URL 参数：直接打开某人的聊天
var params = new URLSearchParams(window.location.search);
var targetUser = params.get('user');
if (targetUser) {
  setTimeout(function() { openChat(targetUser); }, 300);
}

// 定时刷新未读数
setInterval(function() {
  var badge = document.getElementById('msgBadge');
  if (badge && currentUser) {
    var unread = getTotalUnread(currentUser.stuId);
    if (unread > 0) {
      badge.textContent = unread > 99 ? '99+' : unread;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  }
  // 刷新当前聊天
  if (activePartnerId) refreshMessages();
}, 3000);

// ---- 会话列表 ----
function renderConvList() {
  var convs = getConversationsForUser(currentUser.stuId);
  var listEl = document.getElementById('convList');
  if (convs.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#9CA3AF"><p>还没有私信</p><p style="font-size:12px;margin-top:4px">浏览帖子时点击"私聊"按钮开始对话</p></div>';
    return;
  }
  listEl.innerHTML = convs.map(function(c) {
    var isActive = c.partnerId === activePartnerId;
    return '<div class="conv-item' + (isActive ? ' active' : '') + '" onclick="openChat(\'' + c.partnerId + '\')">' +
      '<div class="conv-avatar" style="background:' + c.partnerAvatarBg + ';color:' + c.partnerAvatarColor + '">' + c.partnerAvatar + '</div>' +
      '<div class="conv-info">' +
        '<div class="conv-name-row"><span class="conv-name">' + c.partnerName + '</span><span class="conv-time">' + timeAgo(c.lastTime) + '</span></div>' +
        '<div class="conv-preview-row"><span class="conv-preview">' + (c.lastMsg || '') + '</span>' +
        (c.unreadCount > 0 ? '<span class="conv-unread">' + c.unreadCount + '</span>' : '') +
        '</div>' +
      '</div></div>';
  }).join('');
}

// ---- 打开聊天 ----
function openChat(stuId) {
  var user = getUserByStuId(stuId);
  if (!user) { showToast('用户不存在', 'error'); return; }
  activePartnerId = stuId;
  activePartner = user;
  markMessagesAsRead(currentUser.stuId, stuId);
  renderConvList();

  // 显示聊天区域
  document.getElementById('chatEmptyState').style.display = 'none';
  var activeEl = document.getElementById('chatActive');
  activeEl.style.display = 'flex';

  // 渲染头部
  document.getElementById('chatActiveHeader').innerHTML =
    '<div class="chat-partner-info" onclick="window.location=\'profile.html\'">' +
    '<div class="conv-avatar" style="background:' + user.avatarBg + ';color:' + user.avatarColor + '">' + user.avatarText + '</div>' +
    '<div><strong>' + user.name + '</strong><span style="font-size:11px;color:#9CA3AF;display:block">' + (user.college || '') + ' · ' + (user.grade || '') + ' · ' + (user.campus || '') + '</span></div>' +
    '</div>';

  // 在移动端隐藏侧边栏
  var sidebar = document.getElementById('chatSidebar');
  if (window.innerWidth < 768) sidebar.style.display = 'none';

  refreshMessages();

  // 聚焦输入框
  setTimeout(function() { document.getElementById('chatInput').focus(); }, 100);
}

// ---- 刷新消息 ----
function refreshMessages() {
  if (!activePartnerId) return;
  var msgs = getMessagesBetween(currentUser.stuId, activePartnerId);
  var el = document.getElementById('chatMessages');

  if (msgs.length === 0) {
    el.innerHTML = '<div class="chat-date-divider"><span>开始对话吧</span></div>';
    return;
  }

  var html = '';
  var lastDate = '';
  msgs.forEach(function(m) {
    var d = new Date(m.time).toLocaleDateString('zh-CN');
    if (d !== lastDate) {
      html += '<div class="chat-date-divider"><span>' + d + '</span></div>';
      lastDate = d;
    }
    var isMine = m.from === currentUser.stuId;
    html += '<div class="msg-bubble-row ' + (isMine ? 'mine' : 'theirs') + '">' +
      (isMine ? '' : '<div class="msg-avatar" style="background:' + (activePartner ? activePartner.avatarBg : '#E5E7EB') + ';color:' + (activePartner ? activePartner.avatarColor : '#6B7280') + '">' + (activePartner ? activePartner.avatarText : '?') + '</div>') +
      '<div class="msg-bubble"><p>' + escHtml(m.text) + '</p><span class="msg-time">' + new Date(m.time).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '</span></div>' +
      '</div>';
  });

  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ---- 发送消息 ----
function sendChatMessage() {
  if (!activePartnerId) return;
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  var msg = sendMessage(currentUser.stuId, activePartnerId, text);
  if (!msg) return;
  input.value = '';
  refreshMessages();
  renderConvList();
  // 调整输入框高度
  input.style.height = 'auto';
}

// ---- 键盘事件 ----
function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

// ---- 新建私信搜索 ----
function showNewChatSearch() {
  document.getElementById('chatUserSearch').style.display = 'block';
  document.getElementById('newChatSearchInput').focus();
  renderUserSearch();
}

function hideNewChatSearch() {
  document.getElementById('chatUserSearch').style.display = 'none';
  document.getElementById('newChatSearchInput').value = '';
}

function renderUserSearch() {
  var query = (document.getElementById('newChatSearchInput').value || '').toLowerCase().trim();
  var users = DB.getUsers();
  var results = Object.values(users).filter(function(u) {
    if (u.stuId === currentUser.stuId) return false;
    if (!query) return true;
    return u.name.toLowerCase().includes(query) || u.stuId.includes(query) || (u.major || '').toLowerCase().includes(query);
  }).slice(0, 10);

  var el = document.getElementById('chatUserResults');
  if (results.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:#9CA3AF;font-size:13px;text-align:center">未找到匹配的用户</div>';
    return;
  }
  el.innerHTML = results.map(function(u) {
    return '<div class="user-search-item" onclick="startNewChat(\'' + u.stuId + '\')">' +
      '<div class="conv-avatar" style="background:' + u.avatarBg + ';color:' + u.avatarColor + '">' + u.avatarText + '</div>' +
      '<div><strong>' + u.name + '</strong><span style="font-size:11px;color:#9CA3AF;display:block">' + (u.college || '') + ' · ' + (u.grade || '') + ' · ' + (u.campus || '') + '</span></div>' +
      '</div>';
  }).join('');
}

function startNewChat(stuId) {
  hideNewChatSearch();
  openChat(stuId);
}

// 响应式：点击消息区域头部可返回会话列表
document.getElementById('chatActiveHeader').addEventListener('click', function() {
  if (window.innerWidth < 768) {
    document.getElementById('chatSidebar').style.display = 'block';
    activePartnerId = null;
    document.getElementById('chatActive').style.display = 'none';
    document.getElementById('chatEmptyState').style.display = 'flex';
    renderConvList();
  }
});

// 窗口大小变化时处理
window.addEventListener('resize', function() {
  if (window.innerWidth >= 768) {
    document.getElementById('chatSidebar').style.display = 'block';
  }
});
</script>
</body>
</html>
