<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园帮帮 · 武汉科技大学</title>
<link rel="stylesheet" href="style.css">
<style>
  .svc-page-wrap {
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
  }
  .svc-page-inner {
    flex: 1;
    width: 100%;
    max-width: 1160px;
    margin: 0 auto;
    padding: 28px 20px 40px;
  }
  @media (max-width: 640px) {
    .svc-page-inner { padding: 16px 12px 32px; }
  }
</style>
<script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
<script>
(function(){
  try{
    var beacon=new BeaconAction({
      appkey:'0WEB06U85YBSLJNL',
      versionCode:'1.0.0',
      channelID:'share',
      delay:1000,
      sessionDuration:30*60*1000,
      isOversea:false,
      needReportRqdEvent:false
    });
    beacon.onDirectUserAction('preview_page_view',{
      'url':location.href,
      'referrer':document.referrer,
      'title':document.title,
      'sandbox_id':'86e8fde96b8f4b9ba775ba6d51502ffc'
    });
  }catch(e){}
})();
</script></head>
<body class="page-enter">
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon">U</span>
      <span class="brand-name">UniCampus</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">首页</a>
      <a href="academic.html" class="nav-link">学术</a>
      <a href="market.html" class="nav-link">集市</a>
      <a href="services.html" class="nav-link active">帮帮</a>
      <a href="career.html" class="nav-link">内推</a>
      <a href="activity.html" class="nav-link">约伴</a>
      <a href="social.html" class="nav-link">社交</a>
    </div>
    <div style="flex:1"></div>
    <span id="navCampusBadge" class="brand-tag"></span>
    <button id="searchBtn" style="color:var(--text-muted);padding:6px;cursor:pointer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <div class="user-menu-wrap">
      <div id="navAvatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer" onclick="toggleUserMenu()"></div>
      <div class="user-menu" id="userMenu">
        <div class="user-info-mini"><div class="user-info-name" id="menuName"></div><div class="user-info-sub" id="menuSub"></div></div>
        <a href="profile.html" class="user-menu-item">👤 个人主页</a>
        <div class="user-menu-divider"></div>
        <div class="user-menu-item danger" onclick="logout()">🚪 退出登录</div>
      </div>
    </div>
  </div>
</nav>

<div class="svc-page-wrap">
<div class="svc-page-inner">

  <section class="page-hero fade-up" style="margin-bottom:28px;border-radius:20px">
    <div class="page-hero-inner">
      <h1 style="font-size:28px;font-weight:800;margin-bottom:8px">🤝 校园帮帮</h1>
      <p style="color:hsla(0,0%,100%,0.85);font-size:14px;margin-bottom:0">学习互助 · 跑腿代办 · 拼单生活 · 失物招领 · 兼职 · 租房 · 表白墙 · 树洞</p>
    </div>
  </section>

  <div class="svc-stats stagger-item" id="svcStats"></div>

  <div class="svc-tabs stagger-item" id="svcTabs">
    <button class="svc-tab-btn active" onclick="switchServiceTab('all', this)" style="cursor:pointer">全部</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('study', this)" style="cursor:pointer">📖 学习互助</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('errand', this)" style="cursor:pointer">🏃 跑腿代办</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('group', this)" style="cursor:pointer">🛒 拼单生活</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('lost', this)" style="cursor:pointer">🔍 失物招领</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('job', this)" style="cursor:pointer">💼 兼职招聘</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('rent', this)" style="cursor:pointer">🏠 房屋租转</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('giveaway', this)" style="cursor:pointer">🎁 闲置赠送</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('confess', this)" style="cursor:pointer">💌 表白墙</button>
    <button class="svc-tab-btn" onclick="switchServiceTab('secret', this)" style="cursor:pointer">🌳 树洞</button>
  </div>

  <div class="svc-grid stagger-item" id="svcGrid"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px" class="stagger-item">
    <h3 style="font-size:18px;font-weight:700" id="listTitle">全部服务帖子</h3>
    <div class="market-sort">
      <span>排序：</span>
      <select id="svcSort" onchange="renderSvcPosts()" style="cursor:pointer">
        <option value="newest">最新发布</option>
        <option value="hot">最热门</option>
        <option value="reward">悬赏最高</option>
      </select>
    </div>
    <button class="prof-btn-primary tap-active" onclick="openSvcCreateModal()" style="padding:10px 22px;font-size:14px;display:flex;align-items:center;gap:6px;cursor:pointer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      发布求助
    </button>
  </div>

  <div id="svcPostList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px"></div>

  <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()" style="display:none;width:100%;cursor:pointer">加载更多帖子</button>

</div>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-brand"><div class="brand-icon sm">武</div><span>武汉科技大学校园社区</span></div>
    <p class="footer-copy">仅限武汉科技大学在校师生使用</p>
  </div>
</footer>
</div>

<div class="modal-overlay" id="searchOverlay">
  <div class="modal-box" style="max-width:500px;max-height:80vh">
    <div style="padding:24px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" placeholder="搜索校园帮帮..." style="flex:1;border:none;font-size:16px;outline:none;color:var(--text-primary)" oninput="handleSvcSearch(this.value)">
      </div>
      <div id="searchResults" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto"></div>
      <div id="searchSuggest" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
        <span class="filter-tag" onclick="quickSvcSearch('代课')" style="cursor:pointer">代课</span>
        <span class="filter-tag" onclick="quickSvcSearch('快递')" style="cursor:pointer">快递代取</span>
        <span class="filter-tag" onclick="quickSvcSearch('拼单')" style="cursor:pointer">拼单</span>
        <span class="filter-tag" onclick="quickSvcSearch('失物')" style="cursor:pointer">失物招领</span>
      </div>
    </div>
  </div>
</div>

<script src="core.js"></script>
<script>
(function() {
  'use strict';

  // 认证检查 - 安全处理，不使用 throw
  var user = requireAuth();
  if (!user) { return; }
  renderNav('services.html');

  var menuName = document.getElementById('menuName');
  var menuSub = document.getElementById('menuSub');
  if (menuName) menuName.textContent = user.name;
  if (menuSub) menuSub.textContent = (user.college || '') + ' · ' + (user.grade || '');

  var activeTab = 'all';
  var displayLimit = 12;

  // 搜索按钮由 core.js 统一绑定

  // ---- 统计面板 ----
  function renderStats() {
    var stats = getServiceStats();
    var cards = [
      { icon: '📖', label: '学习互助', num: stats.study || 0, bg: '#EEF2FF', color: '#4F46E5' },
      { icon: '🏃', label: '跑腿代办', num: stats.errand || 0, bg: '#FEF2F2', color: '#DC2626' },
      { icon: '💼', label: '兼职招聘', num: stats.job || 0, bg: '#FFFBEB', color: '#D97706' },
      { icon: '💬', label: '总帖子数', num: stats.total || 0, bg: '#F5F3FF', color: '#7C3AED' }
    ];
    document.getElementById('svcStats').innerHTML = cards.map(function(c) {
      return '<div class="svc-stat-card hover-lift"><div class="svc-stat-icon" style="background:' + c.bg + ';color:' + c.color + '">' + c.icon + '</div><div class="svc-stat-info"><div class="svc-stat-num">' + c.num + '</div><div class="svc-stat-label">' + c.label + '</div></div></div>';
    }).join('');
  }

  // ---- 服务分类网格 ----
  function renderSvcGrid() {
    var stats = getServiceStats();
    var grid = document.getElementById('svcGrid');
    var html = '';
    Object.keys(SERVICE_TYPES).forEach(function(key) {
      var svc = SERVICE_TYPES[key];
      html += '<div class="svc-card ' + svc.css + ' hover-lift tap-active" onclick="window._switchTab(\'' + key + '\')" style="cursor:pointer">'
        + '<div class="svc-icon-circle ' + svc.css + '">' + svc.icon + '</div>'
        + '<div class="svc-card-body"><div class="svc-card-name">' + svc.name + '</div><div class="svc-card-desc">' + svc.desc + '</div></div>'
        + '<div class="svc-card-count"><strong>' + (stats[key] || 0) + '</strong> 条帖子</div>'
        + '<div class="svc-card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>'
        + '</div>';
    });
    grid.innerHTML = html;
  }

  // ---- 服务帖子列表 ----
  function getSvcPosts() {
    var posts = DB.getPosts().filter(function(p) { return p.type === 'service'; });
    if (activeTab !== 'all') posts = posts.filter(function(p) { return p.category === activeTab; });
    var sortEl = document.getElementById('svcSort');
    var sort = sortEl ? sortEl.value : 'newest';
    if (sort === 'hot') posts.sort(function(a,b) { return (b.likes||0) - (a.likes||0); });
    else if (sort === 'reward') posts.sort(function(a,b) { return (parseFloat(b.price||0)||0) - (parseFloat(a.price||0)||0); });
    else posts.sort(function(a,b) { return new Date(b.time) - new Date(a.time); });
    return posts;
  }

  function renderSvcPosts() {
    var posts = getSvcPosts();
    var visible = posts.slice(0, displayLimit);
    var typeInfo = activeTab === 'all' ? { icon: '📋', name: '全部' } : SERVICE_TYPES[activeTab];
    document.getElementById('listTitle').textContent = activeTab === 'all' ? '全部服务帖子' : (typeInfo.icon + ' ' + typeInfo.name + ' 帖子');

    var list = document.getElementById('svcPostList');
    if (visible.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:12px">🔍</div><p style="font-size:15px;margin-bottom:8px">暂无' + (activeTab === 'all' ? '' : (SERVICE_TYPES[activeTab] ? SERVICE_TYPES[activeTab].name : '')) + '相关帖子</p><p style="font-size:13px">成为第一个发布的同学吧！</p></div>';
      document.getElementById('loadMoreBtn').style.display = 'none';
      return;
    }

    list.innerHTML = visible.map(function(p, i) {
      var posterName = p.isAnonymous ? '匿名' : p.authorName;
      var posterAvatar = p.isAnonymous ? '匿' : p.authorAvatar;
      var posterBg = p.isAnonymous ? (p.category === 'confess' ? '#FDF2F8' : '#F5F3FF') : p.authorAvatarBg;
      var posterColor = p.isAnonymous ? (p.category === 'confess' ? '#EC4899' : '#7C3AED') : p.authorAvatarColor;
      var tagLabel = (p.isAnonymous ? '匿名 ' : '') + (SERVICE_TYPES[p.category] ? SERVICE_TYPES[p.category].name : p.category);
      var campusLabel = p.campus || '';
      return '<div class="svc-post-item stagger-item hover-lift tap-active" onclick="openPostDetail(\'' + p.id + '\')" style="animation-delay:' + (i * 30) + 'ms;cursor:pointer">'
        + '<div class="svc-post-left" style="background:' + posterBg + ';color:' + posterColor + '">' + posterAvatar + '</div>'
        + '<div class="svc-post-main">'
        + '<div class="svc-post-title">' + escHtml(p.title) + '</div>'
        + '<div class="svc-post-preview">' + escHtml(String(p.content || '').substring(0, 80)) + '</div>'
        + '<div class="svc-post-meta">'
        + '<span class="svc-post-tag tag-' + p.category + '">' + tagLabel + '</span>'
        + '<span>' + posterName + '</span>'
        + (campusLabel ? '<span>' + campusLabel + '</span>' : '')
        + (p.price ? '<span class="svc-post-reward">' + escHtml(p.price) + '</span>' : '')
        + '<span>👍 ' + (p.likes || 0) + '</span>'
        + '<span class="svc-post-time">' + timeAgo(p.time) + '</span>'
        + '</div></div></div>';
    }).join('');

    var loadBtn = document.getElementById('loadMoreBtn');
    if (posts.length > displayLimit) {
      loadBtn.style.display = 'block';
      loadBtn.textContent = '加载更多 (还有 ' + (posts.length - displayLimit) + ' 条)';
    } else {
      loadBtn.style.display = 'none';
    }
  }

  // ---- 切换分类 ----
  function switchServiceTab(cat, btn) {
    activeTab = cat;
    displayLimit = 12;
    if (btn) {
      document.querySelectorAll('.svc-tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    } else {
      // 如果不是从按钮触发（如从卡片点击），更新tab按钮状态
      document.querySelectorAll('.svc-tab-btn').forEach(function(b) { b.classList.remove('active'); });
      var tabBtns = document.querySelectorAll('#svcTabs .svc-tab-btn');
      tabBtns.forEach(function(b) {
        var onclick = b.getAttribute('onclick') || '';
        if (onclick.indexOf("'" + cat + "'") !== -1) b.classList.add('active');
      });
    }
    renderSvcPosts();
    var postList = document.getElementById('svcPostList');
    if (postList) postList.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 暴露到全局供HTML onclick使用
  window.switchServiceTab = switchServiceTab;
  window._switchTab = function(cat) { switchServiceTab(cat, null); };
  window.renderSvcPosts = renderSvcPosts;

  window.loadMore = function() {
    displayLimit += 12;
    renderSvcPosts();
  };

  // ---- 发帖模态框 ----
  window.openSvcCreateModal = function() {
    var svcTypeBtns = Object.keys(SERVICE_TYPES).map(function(k) {
      var v = SERVICE_TYPES[k];
      return '<button class="post-type-btn" data-type="' + k + '" onclick="window._selectSvcType(\'' + k + '\', this)" style="cursor:pointer">' + v.icon + ' ' + v.name + '</button>';
    }).join('');

    var html = '<div class="create-post-form">'
      + '<div class="modal-header"><h3>📢 发布校园帮帮</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'
      + '<p class="post-sub-info">选择服务类型，填写详细信息</p>'
      + '<div class="post-type-selector" id="svcTypeSelector">' + svcTypeBtns + '</div>'
      + '<input type="hidden" id="svcType" value="">'
      + '<input class="post-form-input" id="svcTitle" placeholder="帖子标题（必填）">'
      + '<textarea class="post-form-textarea" id="svcContent" placeholder="详细描述你的需求..." rows="5"></textarea>'
      + '<div class="post-form-row"><input class="post-form-input" id="svcPrice" placeholder="悬赏/报酬（可选，如：¥30 或 小件3元）"></div>'
      + '<button class="btn-submit-post tap-active" onclick="window._submitSvcPost()" style="cursor:pointer">📢 立即发布</button>'
      + '</div>';
    openModal(html);
  };

  window._selectSvcType = function(type, btn) {
    document.getElementById('svcType').value = type;
    document.querySelectorAll('#svcTypeSelector .post-type-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  };

  window._submitSvcPost = function() {
    var category = document.getElementById('svcType').value;
    var title = document.getElementById('svcTitle').value.trim();
    var content = document.getElementById('svcContent').value.trim();
    var price = document.getElementById('svcPrice').value.trim();

    if (!category) { showToast('请选择服务类型', 'warn'); return; }
    if (!title) { showToast('请输入标题', 'warn'); return; }
    if (!content) { showToast('请输入内容', 'warn'); return; }

    var isAnonymous = (category === 'confess' || category === 'secret');

    var post = createPost({
      type: 'service',
      category: category,
      title: title,
      content: content,
      price: price || '',
      isAnonymous: isAnonymous
    });

    if (isAnonymous && post) {
      post.authorName = '匿名';
      post.authorAvatar = '匿';
      post.authorAvatarBg = category === 'confess' ? '#FDF2F8' : '#F5F3FF';
      post.authorAvatarColor = category === 'confess' ? '#EC4899' : '#7C3AED';
      var posts = DB.getPosts();
      var idx = posts.findIndex(function(p) { return p.id === post.id; });
      if (idx !== -1) {
        posts[idx] = post;
        DB.set('posts', posts);
      }
    }

    closeModal();
    showToast('🎉 发布成功！', 'success');
    activeTab = 'all';
    displayLimit = 12;
    renderStats();
    renderSvcGrid();
    renderSvcPosts();
  };

  // ---- 搜索 ----
  window.handleSvcSearch = function(query) {
    var results = document.getElementById('searchResults');
    var suggest = document.getElementById('searchSuggest');
    if (!query || !query.trim()) {
      results.innerHTML = '';
      suggest.style.display = 'flex';
      return;
    }
    suggest.style.display = 'none';
    var q = query.toLowerCase();
    var posts = DB.getPosts().filter(function(p) {
      return p.type === 'service' && (
        (p.title||'').toLowerCase().indexOf(q) !== -1 ||
        (p.content||'').toLowerCase().indexOf(q) !== -1 ||
        (p.category||'').toLowerCase().indexOf(q) !== -1 ||
        (p.authorName||'').toLowerCase().indexOf(q) !== -1
      );
    }).slice(0, 8);

    if (posts.length === 0) {
      results.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">未找到相关结果</p>';
      return;
    }

    results.innerHTML = posts.map(function(p) {
      return '<div class="svc-post-item" onclick="closeSearch();openPostDetail(\'' + p.id + '\')" style="cursor:pointer">'
        + '<div class="svc-post-left" style="background:' + p.authorAvatarBg + ';color:' + p.authorAvatarColor + '">' + p.authorAvatar + '</div>'
        + '<div class="svc-post-main">'
        + '<div class="svc-post-title">' + escHtml(p.title) + '</div>'
        + '<div class="svc-post-meta">'
        + '<span class="svc-post-tag tag-' + p.category + '">' + (SERVICE_TYPES[p.category] ? SERVICE_TYPES[p.category].icon + ' ' + SERVICE_TYPES[p.category].name : '') + '</span>'
        + '<span>' + timeAgo(p.time) + '</span>'
        + '</div></div></div>';
    }).join('');
  };

  window.quickSvcSearch = function(kw) {
    var input = document.getElementById('searchInput');
    if (input) input.value = kw;
    handleSvcSearch(kw);
    openSearch();
  };

  // ---- 用户菜单 ----
  window.toggleUserMenu = function() {
    var menu = document.getElementById('userMenu');
    if (menu) menu.classList.toggle('open');
  };

  document.addEventListener('click', function(e) {
    var menu = document.getElementById('userMenu');
    var avatar = document.getElementById('navAvatar');
    if (menu && avatar && !avatar.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove('open');
    }
  });

  // ---- 初始化 ----
  renderStats();
  renderSvcGrid();
  renderSvcPosts();

  // Ctrl+K 搜索
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      openSearch();
    }
  });

})();
</script>
</body>
</html>
