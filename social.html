<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交动态 - 武汉科技大学社区</title>
<link rel="stylesheet" href="style.css">
<script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
<script>
(function(){
  try{
    var beacon=new BeaconAction({
      appkey:'0WEB06U85YBSLJNL',
      versionCode:'1.0.0',
      channelID:'share',
      delay:1000,
      sessionDuration:30*60*1000,
      isOversea:false,
      needReportRqdEvent:false
    });
    beacon.onDirectUserAction('preview_page_view',{
      'url':location.href,
      'referrer':document.referrer,
      'title':document.title,
      'sandbox_id':'86e8fde96b8f4b9ba775ba6d51502ffc'
    });
  }catch(e){}
})();
</script></head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="nav-brand"><div class="brand-icon">武</div><span class="brand-name">武科大社区</span><span class="brand-tag" id="navCampusBadge">校区</span></div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">首页</a><a href="academic.html" class="nav-link">学术广场</a>
      <a href="market.html" class="nav-link">二手集市</a>
      <a href="services.html" class="nav-link">帮帮</a><a href="social.html" class="nav-link active">社交动态</a>
      <a href="career.html" class="nav-link">职业内推</a><a href="activity.html" class="nav-link">活动约伴</a>
    </div>
    <div class="nav-actions">
      <div class="nav-weather" id="navWeather"></div>
      <button class="btn-icon" id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      <div class="user-menu-wrap"><div class="avatar-wrap" id="navAvatarWrap"><div class="avatar" id="navAvatar" style="cursor:pointer">用</div></div>
        <div class="user-menu" id="userMenu"><div class="user-info-mini"><div class="user-info-name" id="navUserName">加载中</div><div class="user-info-sub" id="navUserSub">武汉科技大学</div></div>
          <div class="user-menu-item" onclick="window.location='profile.html'">个人主页</div><div class="user-menu-divider"></div><div class="user-menu-item danger" onclick="logout()">退出登录</div></div></div>
    </div>
  </div>
</nav>
<div class="search-overlay" id="searchOverlay">
  <div class="search-box"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="搜索动态..." id="searchInput" autofocus><button onclick="closeSearch()">取消</button></div>
</div>

<section class="page-hero" style="background:linear-gradient(135deg,#EC4899 0%,#F43F5E 100%)">
  <div class="page-hero-inner">
    <h1>👥 社交动态</h1>
    <p>分享校园生活 · 发现好友 · 两校区连线互动</p>
    <div class="page-hero-actions">
      <button class="btn-primary" onclick="openPostModal()">✏️ 发布动态</button>
    </div>
  </div>
</section>

<div class="page-container">
  <div class="two-col">
    <div class="feed-main">
      <!-- 发布框 -->
      <div class="aside-card" style="margin-bottom:16px">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0" id="socialPostAvatar"></div>
          <div style="flex:1">
            <textarea id="socialTextarea" placeholder="分享你的校园生活..." rows="3" style="width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:10px 12px;font-size:14px;resize:none;outline:none;font-family:inherit"></textarea>
            <div style="display:flex;justify-content:flex-end;margin-top:8px">
              <button style="background:#4F46E5;color:white;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500" onclick="postSocial()">发布</button>
            </div>
          </div>
        </div>
      </div>

      <div class="feed-tabs" style="margin-bottom:12px">
        <button class="tab-btn active" onclick="switchSocialTab(this,'all')">全部</button>
        <button class="tab-btn" onclick="switchSocialTab(this,'qs')">青山校区</button>
        <button class="tab-btn" onclick="switchSocialTab(this,'hjh')">黄家湖校区</button>
      </div>

      <div id="socialFeed"></div>
      <button class="load-more-btn" id="loadMoreSoc" onclick="loadMoreSocial()">加载更多</button>
    </div>

    <aside>
      <!-- 校区天气 -->
      <div class="aside-card weather-card" id="weatherCard" style="margin-bottom:16px">
        <div class="mi-weather-loading"><div class="mi-weather-spinner"></div><span>正在获取天气…</span></div>
      </div>
      <div class="aside-card" style="margin-bottom:16px">
        <p class="aside-title">我的信息</p>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px" id="myProfileCard">
          <div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700" id="mySelfAvatar"></div>
          <div>
            <div style="font-size:14px;font-weight:600" id="mySelfName">—</div>
            <div style="font-size:12px;color:#6B7280" id="mySelfSub">—</div>
          </div>
        </div>
        <button style="width:100%;padding:8px;background:#EEF2FF;color:#4F46E5;border-radius:8px;font-size:13px;font-weight:500" onclick="window.location='profile.html'">查看我的主页</button>
      </div>

      <!-- 好友推荐 -->
      <div class="aside-card" style="margin-bottom:16px">
        <p class="aside-title">认识新同学</p>
        <div id="friendSuggest"></div>
      </div>

      <!-- 圈子 -->
      <div class="aside-card">
        <p class="aside-title">热门圈子</p>
        <div style="display:flex;flex-direction:column;gap:8px" id="circleList">
          <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:.2s" onmouseover="this.style.background='#F9FAFB'" onmouseout="this.style.background='transparent'">
            <div style="width:36px;height:36px;border-radius:10px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:18px">💻</div>
            <div><div style="font-size:13px;font-weight:500">计算机学院圈</div><div style="font-size:11px;color:#9CA3AF">1,240人</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:.2s" onmouseover="this.style.background='#F9FAFB'" onmouseout="this.style.background='transparent'">
            <div style="width:36px;height:36px;border-radius:10px;background:#FEF2F2;display:flex;align-items:center;justify-content:center;font-size:18px">⚽</div>
            <div><div style="font-size:13px;font-weight:500">运动爱好者</div><div style="font-size:11px;color:#9CA3AF">856人</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:.2s" onmouseover="this.style.background='#F9FAFB'" onmouseout="this.style.background='transparent'">
            <div style="width:36px;height:36px;border-radius:10px;background:#FDF2F8;display:flex;align-items:center;justify-content:center;font-size:18px">📷</div>
            <div><div style="font-size:13px;font-weight:500">摄影爱好者</div><div style="font-size:11px;color:#9CA3AF">432人</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:.2s" onmouseover="this.style.background='#F9FAFB'" onmouseout="this.style.background='transparent'">
            <div style="width:36px;height:36px;border-radius:10px;background:#FFFBEB;display:flex;align-items:center;justify-content:center;font-size:18px">🌿</div>
            <div><div style="font-size:13px;font-weight:500">黄家湖老乡圈</div><div style="font-size:11px;color:#9CA3AF">680人</div></div>
          </div>
        </div>
      </div>
    </aside>
  </div>
</div>

<!-- 聊天面板 -->
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="msg-avatar" style="background:#EEEDFE;color:#534AB7">系</div>
    <span class="chat-header-title">系统小助手</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-msgs" id="chatMsgs">
    <div class="msg-row"><div class="msg-avatar" style="background:#EEEDFE;color:#534AB7">系</div><div class="msg-bubble">你好！我是武科大社区小助手，有什么可以帮你的？😊</div></div>
  </div>
  <div class="chat-input-wrap">
    <input type="text" id="chatMsgInput" placeholder="发送消息...">
    <button class="chat-send" onclick="sendMsg()">发送</button>
  </div>
</div>

<footer class="footer">
  <div class="footer-container"><div class="footer-brand"><div class="brand-icon sm">武</div><span>武汉科技大学校园社区</span></div><p class="footer-copy">仅限武汉科技大学在校师生使用</p></div>
</footer>
<button class="fab" id="chatFab" onclick="toggleChat()" title="打开聊天" style="bottom:28px;right:88px;background:#EC4899">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>
<button class="fab" onclick="openPostModal()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<script src="core.js"></script>
<script>
const currentUser = requireAuth();
renderNav('social.html');
renderNavWeather(DB.getCurrentUser()?.campus || '青山校区');
document.getElementById('navAvatarWrap').addEventListener('click', () => document.getElementById('userMenu').classList.toggle('open'));
document.addEventListener('click', e => { if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.remove('open'); });

if (currentUser) {
  const av = document.getElementById('socialPostAvatar');
  av.style.background = currentUser.avatarBg; av.style.color = currentUser.avatarColor; av.textContent = currentUser.avatarText;
  const av2 = document.getElementById('mySelfAvatar');
  av2.style.background = currentUser.avatarBg; av2.style.color = currentUser.avatarColor; av2.textContent = currentUser.avatarText;
  document.getElementById('mySelfName').textContent = currentUser.name;
  document.getElementById('mySelfSub').textContent = currentUser.major + ' · ' + currentUser.grade + ' · ' + currentUser.campus;
}

let socialCount = 8;
let socialCampus = 'all';

function switchSocialTab(btn, campus) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); socialCampus = campus; socialCount = 8; renderSocialFeed();
}

function renderSocialFeed() {
  let posts = DB.getPosts();
  if (socialCampus === 'qs') posts = posts.filter(p => p.campus === '青山校区');
  else if (socialCampus === 'hjh') posts = posts.filter(p => p.campus === '黄家湖校区');
  const toShow = posts.slice(0, socialCount);
  const listEl = document.getElementById('socialFeed');
  if (!toShow.length) { listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF">暂无动态</div>'; return; }
  listEl.innerHTML = toShow.map(post => {
    const isLiked = currentUser && (post.likedBy || []).includes(currentUser.stuId);
    return `<div class="post-card">
      <div class="post-header">
        <div class="post-avatar" style="background:${post.authorAvatarBg};color:${post.authorAvatarColor}">${post.authorAvatar}</div>
        <div class="post-meta">
          <span class="post-author">${post.authorName}</span>
          <span class="post-badge ${post.type}">${post.category}</span>
          <span style="font-size:11px;padding:2px 7px;border-radius:10px;background:${post.campus==='青山校区'?'#EEF2FF':'#F0FDF4'};color:${post.campus==='青山校区'?'#4F46E5':'#059669'}">${post.campus}</span>
          <span class="post-time">${timeAgo(post.time)}</span>
        </div>
      </div>
      <div class="post-body" onclick="openPostDetail('${post.id}')" style="cursor:pointer">
        ${post.title ? `<p class="post-title">${escHtml(post.title)}</p>` : ''}
        <p>${escHtml(post.content.slice(0, 150))}${post.content.length > 150 ? '...' : ''}</p>
      </div>
      <div class="post-actions">
        <button class="action-btn soc-like ${isLiked ? 'liked' : ''}" data-pid="${post.id}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span>${post.likes}</span>
        </button>
        <button class="action-btn" onclick="openPostDetail('${post.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>${(post.comments || []).length} 回复</span>
        </button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('loadMoreSoc').style.display = posts.length > socialCount ? 'block' : 'none';
  document.querySelectorAll('.soc-like').forEach(btn => {
    btn.addEventListener('click', function() {
      const r = togglePostLike(this.dataset.pid); if (!r) return;
      this.classList.toggle('liked', r.liked);
      this.querySelector('path').setAttribute('fill', r.liked ? 'currentColor' : 'none');
      this.querySelector('span').textContent = r.count;
      showToast(r.liked ? '已点赞' : '取消点赞', 'info');
    });
  });
}

function loadMoreSocial() { socialCount += 8; renderSocialFeed(); }

function postSocial() {
  const ta = document.getElementById('socialTextarea');
  if (!ta.value.trim()) { showToast('请输入内容', 'warn'); return; }
  createPost({ type: 'social', category: '动态', title: '', content: ta.value.trim() });
  ta.value = ''; renderSocialFeed(); showToast('发布成功！', 'success');
}

function openPostModal() {
  openModal(`<div class="create-post-form">
    <h3>发布动态</h3>
    <p class="post-sub-info">发布者：${currentUser?.name} · ${currentUser?.campus}</p>
    <textarea class="post-form-textarea" id="mpContent" placeholder="分享你的校园生活..." rows="5"></textarea>
    <button class="btn-submit-post" onclick="doMPost()">发布</button>
  </div>`);
}

function doMPost() {
  const c = document.getElementById('mpContent').value.trim();
  if (!c) { showToast('请输入内容', 'warn'); return; }
  createPost({ type: 'social', category: '动态', title: '', content: c });
  closeModal(); renderSocialFeed(); showToast('发布成功！', 'success');
}

// 好友推荐
function renderFriendSuggest() {
  const users = DB.getUsers();
  const others = Object.values(users).filter(u => u.stuId !== currentUser?.stuId).slice(0, 4);
  document.getElementById('friendSuggest').innerHTML = others.map(u => `
    <div class="suggest-item" style="margin-bottom:10px">
      <div class="suggest-avatar" style="background:${u.avatarBg};color:${u.avatarColor}">${u.avatarText}</div>
      <div class="suggest-info"><p class="suggest-name">${u.name}</p><p class="suggest-sub">${u.grade} · ${u.campus}</p></div>
      <button class="add-friend-btn" onclick="this.textContent='已发送';this.style.background='#EEF2FF';this.style.color='#6366F1';showToast('好友申请已发送','success')">加好友</button>
    </div>`).join('') || '<p style="font-size:13px;color:#9CA3AF">暂无推荐</p>';
}

// 聊天
function toggleChat() {
  const p = document.getElementById('chatPanel');
  p.classList.toggle('open');
}
function sendMsg() {
  const inp = document.getElementById('chatMsgInput');
  if (!inp.value.trim()) return;
  const msgs = document.getElementById('chatMsgs');
  const row = document.createElement('div'); row.className = 'msg-row self';
  row.innerHTML = `<div class="msg-bubble">${escHtml(inp.value)}</div>`;
  msgs.appendChild(row); inp.value = ''; msgs.scrollTop = msgs.scrollHeight;
  setTimeout(() => {
    const r = document.createElement('div'); r.className = 'msg-row';
    r.innerHTML = `<div class="msg-avatar" style="background:#EEEDFE;color:#534AB7">系</div><div class="msg-bubble">收到啦！感谢你的消息 😊</div>`;
    msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
  }, 600);
}
document.getElementById('chatMsgInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

renderSocialFeed();
renderFriendSuggest();
renderWeatherCard(DB.getCurrentUser()?.campus || '青山校区');
</script>
</body>
</html>
