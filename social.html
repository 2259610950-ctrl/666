<script src="core.js"></script>
<script>
const currentUser = requireAuth();
renderNav('social.html');
// 天气与用户名
var _userCampus = currentUser ? currentUser.campus : '青山校区';
renderWeatherCard(_userCampus);
var nameEl = document.getElementById('navUserNameVisible');
if (nameEl && currentUser) {
  nameEl.style.display = '';
  nameEl.textContent = currentUser.name;
}
document.getElementById('navAvatarWrap').addEventListener('click', () => document.getElementById('userMenu').classList.toggle('open'));
document.addEventListener('click', e => { if (!document.getElementById('navAvatarWrap').contains(e.target)) document.getElementById('userMenu').classList.remove('open'); });

if (currentUser) {
  const av = document.getElementById('socialPostAvatar');
  av.style.background = currentUser.avatarBg; av.style.color = currentUser.avatarColor; av.textContent = currentUser.avatarText;
  const av2 = document.getElementById('mySelfAvatar');
  av2.style.background = currentUser.avatarBg; av2.style.color = currentUser.avatarColor; av2.textContent = currentUser.avatarText;
  document.getElementById('mySelfName').textContent = currentUser.name;
  document.getElementById('mySelfSub').textContent = currentUser.major + ' · ' + currentUser.grade + ' · ' + currentUser.campus;
}

let socialCount = 8;
let socialCampus = 'all';

function switchSocialTab(btn, campus) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); socialCampus = campus; socialCount = 8; renderSocialFeed();
}

function renderSocialFeed() {
  let posts = DB.getPosts();
  if (socialCampus === 'qs') posts = posts.filter(p => p.campus === '青山校区');
  else if (socialCampus === 'hjh') posts = posts.filter(p => p.campus === '黄家湖校区');
  const toShow = posts.slice(0, socialCount);
  const listEl = document.getElementById('socialFeed');
  if (!toShow.length) { listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF">暂无动态</div>'; return; }
  listEl.innerHTML = toShow.map(post => {
    const isLiked = currentUser && (post.likedBy || []).includes(currentUser.stuId);
    return `<div class="post-card">
      <div class="post-header">
        <div class="post-avatar" style="background:${post.authorAvatarBg};color:${post.authorAvatarColor}">${post.authorAvatar}</div>
        <div class="post-meta">
          <span class="post-author">${post.authorName}</span>
          <span class="post-badge ${post.type}">${post.category}</span>
          <span style="font-size:11px;padding:2px 7px;border-radius:10px;background:${post.campus==='青山校区'?'#EEF2FF':'#F0FDF4'};color:${post.campus==='青山校区'?'#4F46E5':'#059669'}">${post.campus}</span>
          <span class="post-time">${timeAgo(post.time)}</span>
        </div>
      </div>
      <div class="post-body" onclick="openPostDetail('${post.id}')" style="cursor:pointer">
        ${post.title ? `<p class="post-title">${escHtml(post.title)}</p>` : ''}
        <p>${escHtml(post.content.slice(0, 150))}${post.content.length > 150 ? '...' : ''}</p>
      </div>
      <div class="post-actions">
        <button class="action-btn soc-like ${isLiked ? 'liked' : ''}" data-pid="${post.id}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span>${post.likes}</span>
        </button>
        <button class="action-btn" onclick="openPostDetail('${post.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>${(post.comments || []).length} 回复</span>
        </button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('loadMoreSoc').style.display = posts.length > socialCount ? 'block' : 'none';
  document.querySelectorAll('.soc-like').forEach(btn => {
    btn.addEventListener('click', function() {
      const r = togglePostLike(this.dataset.pid); if (!r) return;
      this.classList.toggle('liked', r.liked);
      this.querySelector('path').setAttribute('fill', r.liked ? 'currentColor' : 'none');
      this.querySelector('span').textContent = r.count;
      showToast(r.liked ? '已点赞' : '取消点赞', 'info');
    });
  });
}

function loadMoreSocial() { socialCount += 8; renderSocialFeed(); }

function postSocial() {
  const ta = document.getElementById('socialTextarea');
  if (!ta.value.trim()) { showToast('请输入内容', 'warn'); return; }
  createPost({ type: 'social', category: '动态', title: '', content: ta.value.trim() });
  ta.value = ''; renderSocialFeed(); showToast('发布成功！', 'success');
}

function openPostModal() {
  openModal(`<div class="create-post-form">
    <h3>发布动态</h3>
    <p class="post-sub-info">发布者：${currentUser?.name} · ${currentUser?.campus}</p>
    <textarea class="post-form-textarea" id="mpContent" placeholder="分享你的校园生活..." rows="5"></textarea>
    <button class="btn-submit-post" onclick="doMPost()">发布</button>
  </div>`);
}

function doMPost() {
  const c = document.getElementById('mpContent').value.trim();
  if (!c) { showToast('请输入内容', 'warn'); return; }
  createPost({ type: 'social', category: '动态', title: '', content: c });
  closeModal(); renderSocialFeed(); showToast('发布成功！', 'success');
}

// 好友推荐
function renderFriendSuggest() {
  const users = DB.getUsers();
  const others = Object.values(users).filter(u => u.stuId !== currentUser?.stuId).slice(0, 4);
  document.getElementById('friendSuggest').innerHTML = others.map(u => `
    <div class="suggest-item" style="margin-bottom:10px">
      <div class="suggest-avatar" style="background:${u.avatarBg};color:${u.avatarColor}">${u.avatarText}</div>
      <div class="suggest-info"><p class="suggest-name">${u.name}</p><p class="suggest-sub">${u.grade} · ${u.campus}</p></div>
      <button class="add-friend-btn" onclick="this.textContent='已发送';this.style.background='#EEF2FF';this.style.color='#6366F1';showToast('好友申请已发送','success')">加好友</button>
    </div>`).join('') || '<p style="font-size:13px;color:#9CA3AF">暂无推荐</p>';
}

// 聊天
function toggleChat() {
  const p = document.getElementById('chatPanel');
  p.classList.toggle('open');
}
function sendMsg() {
  const inp = document.getElementById('chatMsgInput');
  if (!inp.value.trim()) return;
  const msgs = document.getElementById('chatMsgs');
  const row = document.createElement('div'); row.className = 'msg-row self';
  row.innerHTML = `<div class="msg-bubble">${escHtml(inp.value)}</div>`;
  msgs.appendChild(row); inp.value = ''; msgs.scrollTop = msgs.scrollHeight;
  setTimeout(() => {
    const r = document.createElement('div'); r.className = 'msg-row';
    r.innerHTML = `<div class="msg-avatar" style="background:#EEEDFE;color:#534AB7">系</div><div class="msg-bubble">收到啦！感谢你的消息 😊</div>`;
    msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
  }, 600);
}
document.getElementById('chatMsgInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
