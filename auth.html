<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>登录 / 注册 - 武科大社区</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #4F46E5; --brand-light: #818CF8; --brand-bg: #EEF2FF;
  --text-primary: #1F2937; --text-secondary: #374151; --text-muted: #6B7280;
  --border: #E5E7EB; --error: #EF4444; --success: #10B981;
  --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left); --safe-right: env(safe-area-inset-right);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  padding: 0; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
  overflow-x: hidden; -webkit-text-size-adjust: 100%;
}

/* ===== 移动端主体布局（垂直堆叠） ===== */
.auth-page {
  flex: 1; display: flex; flex-direction: column;
  width: 100%; max-width: 480px; margin: 0 auto;
  min-height: 100vh; min-height: 100dvh;
  animation: pageIn 0.4s ease-out;
}
@keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== 品牌区（移动端精简） ===== */
.auth-brand-mobile {
  padding: 20px 20px 16px;
  text-align: center; color: white;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 120px;
  flex-shrink: 0;
  position: relative;
}
.auth-brand-mobile::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
}
.brand-icon-sm { width: 44px; height: 44px; background: rgba(255,255,255,.2); backdrop-filter: blur(8px); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; margin-bottom: 10px; border: 1px solid rgba(255,255,255,.15); }
.auth-brand-mobile h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
.auth-brand-mobile p { font-size: 13px; opacity: .7; }

/* ===== 表单区（白色卡片） ===== */
.auth-form-wrap {
  flex: 1; background: white; border-radius: 20px 20px 0 0;
  padding: 0 20px; padding-bottom: calc(20px + var(--safe-bottom));
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  position: relative;
  margin-top: -8px;
  box-shadow: 0 -4px 24px rgba(0,0,0,.1);
}

/* ===== Tab 切换 ===== */
.auth-tabs {
  display: flex; position: sticky; top: 0; z-index: 10;
  background: white; border-radius: 20px 20px 0 0;
  margin: 0 -20px; padding: 0 20px;
  border-bottom: 1px solid #F3F4F6;
}
.auth-tab {
  flex: 1; padding: 16px 0; text-align: center;
  font-size: 15px; font-weight: 600; color: #9CA3AF;
  border: none; background: none; cursor: pointer;
  position: relative; transition: color 0.25s ease;
  min-height: 48px;
}
.auth-tab.active { color: var(--brand); }
.auth-tab::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 3px; background: var(--brand); border-radius: 2px;
  transform: scaleX(0); transition: transform 0.3s cubic-bezier(.22,1,.36,1);
}
.auth-tab.active::after { transform: scaleX(1); }

/* ===== 表单容器 ===== */
.auth-form { padding: 24px 0; display: flex; flex-direction: column; gap: 16px; }
.auth-form.hidden { display: none; }
.auth-form.animating { animation: formSlideIn 0.3s ease-out both; }
@keyframes formSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ===== 表单字段 ===== */
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 14px; font-weight: 500; color: var(--text-secondary); }

.input-wrap {
  position: relative; display: flex; align-items: center;
  background: #F9FAFB; border: 1.5px solid var(--border);
  border-radius: 12px; transition: all 0.25s ease;
}
.input-wrap:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
  background: white;
}
.input-wrap.has-error { border-color: var(--error); background: #FEF2F2; }
.input-wrap.has-error:focus-within { box-shadow: 0 0 0 3px rgba(239,68,68,.08); }
.input-wrap.has-success { border-color: var(--success); }

.input-wrap svg {
  position: absolute; left: 14px; color: #9CA3AF;
  pointer-events: none; transition: color 0.2s; flex-shrink: 0;
}
.input-wrap:focus-within svg { color: var(--brand); }

.input-wrap input {
  width: 100%; height: 52px; padding: 0 16px 0 44px;
  border: none; background: transparent;
  font-size: 16px; color: var(--text-primary); outline: none;
  -webkit-appearance: none; appearance: none;
}
.input-wrap input::placeholder { color: #9CA3AF; }

/* 密码显示按钮（48x48 触摸热区） */
.pwd-toggle {
  position: absolute; right: 4px;
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: #9CA3AF;
  cursor: pointer; border-radius: 10px;
  transition: color 0.2s, background 0.2s;
  flex-shrink: 0;
}
.pwd-toggle:hover, .pwd-toggle:active { color: var(--brand); background: var(--brand-bg); }
.pwd-toggle svg { transition: transform 0.2s ease; }
.pwd-toggle:active svg { transform: scale(0.9); }

/* 字段错误提示 */
.field-error { font-size: 12px; color: var(--error); min-height: 16px; line-height: 1.4; padding-left: 2px; display: none; }
.field-error.show { display: block; animation: errorIn 0.2s ease; }
@keyframes errorIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ===== 校区选择卡片（垂直堆叠） ===== */
.campus-selector { display: flex; flex-direction: column; gap: 10px; }
.campus-option { cursor: pointer; }
.campus-option input { display: none; }
.campus-card {
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px; height: 56px;
  border: 1.5px solid var(--border); border-radius: 12px;
  transition: all 0.25s ease; background: white;
}
.campus-card:hover { border-color: #C7D2FE; }
.campus-card.selected {
  border-color: var(--brand); background: var(--brand); color: white;
  box-shadow: 0 4px 12px rgba(79,70,229,.25);
}
.campus-card.selected .campus-name { color: white; }
.campus-card.selected .campus-desc { color: rgba(255,255,255,.8); }
.campus-card.selected .campus-check { opacity: 1; transform: scale(1); }
.campus-icon { font-size: 22px; flex-shrink: 0; }
.campus-info { flex: 1; }
.campus-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.campus-desc { font-size: 12px; color: var(--text-muted); }
.campus-check { opacity: 0; transform: scale(0.5); transition: all 0.25s cubic-bezier(.22,1,.36,1); flex-shrink: 0; }

/* ===== 行内布局 ===== */
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; min-width: 0; }

/* ===== 专业提示 ===== */
.major-hint { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }
.major-hint.hidden { display: none; }

/* ===== 记住我 ===== */
.form-options { display: flex; align-items: center; margin: -4px 0; }
.remember-me {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; color: var(--text-muted); cursor: pointer;
  user-select: none; padding: 8px 0; min-height: 44px;
}
.remember-me input[type="checkbox"] { display: none; }
.remember-me .checkbox-custom {
  width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease; flex-shrink: 0;
}
.remember-me input:checked + .checkbox-custom {
  background: var(--brand); border-color: var(--brand);
}
.remember-me input:checked + .checkbox-custom::after {
  content: '✓'; color: white; font-size: 12px; font-weight: 700;
}

/* ===== 错误提示 ===== */
.form-error { font-size: 13px; color: var(--error); min-height: 20px; line-height: 1.4; }

/* ===== 提交按钮 ===== */
.btn-submit {
  width: 100%; height: 52px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, var(--brand) 0%, #6366F1 100%);
  color: white; font-size: 16px; font-weight: 600;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.25s ease; min-height: 52px;
}
.btn-submit:hover { box-shadow: 0 6px 20px rgba(79,70,229,.3); }
.btn-submit:active { transform: scale(0.98); }
.btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.btn-submit .btn-text { transition: opacity 0.2s; }
.btn-submit .spinner {
  display: none; position: absolute; top: 50%; left: 50%;
  margin: -10px 0 0 -10px;
  width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-submit.loading .btn-text { opacity: 0; }
.btn-submit.loading .spinner { display: block; }

/* ===== 底部链接 ===== */
.auth-tip { font-size: 14px; color: var(--text-muted); text-align: center; padding: 8px 0; }
.auth-tip a { color: var(--brand); font-weight: 600; text-decoration: none; }

/* ===== 底部选择器弹窗（iOS 风格） ===== */
.bottom-sheet-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.4);
  opacity: 0; visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s;
}
.bottom-sheet-overlay.open { opacity: 1; visibility: visible; }
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
  background: white; border-radius: 16px 16px 0 0;
  max-height: 50vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(.22,1,.36,1);
  padding-bottom: var(--safe-bottom);
}
.bottom-sheet-overlay.open .bottom-sheet { transform: translateY(0); }
.bottom-sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid #F3F4F6;
  flex-shrink: 0;
}
.bottom-sheet-header .cancel { color: var(--text-muted); font-size: 15px; background: none; border: none; cursor: pointer; min-height: 44px; }
.bottom-sheet-header .confirm { color: var(--brand); font-size: 15px; font-weight: 600; background: none; border: none; cursor: pointer; min-height: 44px; }
.bottom-sheet-header h3 { font-size: 16px; font-weight: 600; }
.bottom-sheet-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.bottom-sheet-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; font-size: 15px; color: var(--text-primary);
  cursor: pointer; transition: background 0.15s;
  min-height: 48px;
}
.bottom-sheet-item:active { background: #F3F4F6; }
.bottom-sheet-item.selected { color: var(--brand); font-weight: 600; }
.bottom-sheet-item .check { color: var(--brand); font-size: 18px; opacity: 0; }
.bottom-sheet-item.selected .check { opacity: 1; }

/* ===== Toast ===== */
.auth-toast {
  position: fixed; bottom: calc(40px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 28px; border-radius: 28px;
  font-size: 14px; font-weight: 500; z-index: 9999;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  opacity: 0; transition: all 0.3s cubic-bezier(.22,1,.36,1);
  white-space: nowrap; pointer-events: none;
  max-width: 90vw; text-align: center;
}
.auth-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.auth-toast.success { background: var(--brand); color: white; }
.auth-toast.error { background: var(--error); color: white; }

/* ===== 横屏适配 ===== */
@media (orientation: landscape) and (max-height: 500px) {
  .auth-brand-mobile { min-height: 60px; padding: 8px 20px; }
  .auth-brand-mobile h1 { font-size: 18px; margin-bottom: 2px; }
  .auth-brand-mobile p { font-size: 12px; }
  .brand-icon-sm { width: 36px; height: 36px; font-size: 16px; margin-bottom: 6px; }
  .auth-form { padding: 12px 0; gap: 10px; }
  .auth-form-wrap { padding-top: 0; }
}

/* ===== 超小屏 ≤360px ===== */
@media (max-width: 360px) {
  .auth-brand-mobile { min-height: 90px; padding: 12px 16px 10px; }
  .auth-brand-mobile h1 { font-size: 18px; }
  .auth-brand-mobile p { font-size: 12px; }
  .brand-icon-sm { width: 38px; height: 38px; font-size: 17px; margin-bottom: 8px; }
  .auth-form-wrap { padding: 0 16px; padding-bottom: calc(16px + var(--safe-bottom)); }
  .auth-form { padding: 16px 0; gap: 12px; }
  .form-group label { font-size: 13px; }
  .input-wrap input { height: 48px; font-size: 15px; }
  .campus-card { height: 50px; padding: 0 12px; }
  .btn-submit { height: 48px; font-size: 15px; }
}

/* ===== PC 端适配（>768px） ===== */
@media (min-width: 769px) {
  body { align-items: center; justify-content: center; padding: 24px; }
  .auth-page {
    flex-direction: row; max-width: 960px;
    min-height: auto; height: auto;
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,.25);
    animation: cardFadeIn 0.5s ease;
  }
  @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .auth-brand-mobile {
    flex: 1; background: #4338CA; min-height: auto;
    padding: 48px 40px; justify-content: center;
    border-radius: 0;
  }
  .auth-brand-mobile::after { display: none; }
  .auth-brand-mobile h1 { font-size: 28px; }
  .auth-brand-mobile p { font-size: 14px; margin-bottom: 0; }
  .brand-icon-sm { width: 56px; height: 56px; font-size: 24px; margin-bottom: 20px; }

  .auth-form-wrap {
    width: 420px; flex: none;
    border-radius: 0; padding: 0 40px;
    margin-top: 0; box-shadow: none;
    display: flex; flex-direction: column; justify-content: center;
    overflow: visible; background: white;
  }
  .auth-tabs {
    position: static; margin: 0; padding: 0;
    border-radius: 0; background: white;
    border-bottom: 2px solid #F3F4F6;
    display: flex;
  }
  .auth-tab {
    flex: 1; padding: 14px 0; font-size: 16px;
    font-weight: 600; color: #9CA3AF;
    border: none; background: none; cursor: pointer;
    position: relative; text-align: center;
    transition: color 0.25s ease;
  }
  .auth-tab.active { color: #4F46E5; }
  .auth-tab::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 3px; background: #4F46E5; border-radius: 2px;
    transform: scaleX(0); transition: transform 0.3s cubic-bezier(.22,1,.36,1);
  }
  .auth-tab.active::after { transform: scaleX(1); }
  .auth-form { padding: 28px 0; gap: 18px; }
  .input-wrap input { height: auto; padding: 12px 16px 12px 44px; font-size: 14px; }
  .input-wrap { background: white; border: 1.5px solid #E5E7EB; }
  .remember-me { min-height: auto; padding: 4px 0; gap: 8px; }
  .remember-me .checkbox-custom { width: 18px; height: 18px; flex-shrink: 0; }
  .campus-selector { flex-direction: row; gap: 12px; }
  .campus-card { height: auto; padding: 16px; flex-direction: column; text-align: center; gap: 6px; }
  .form-row .grade-group { flex: 0 0 110px; }
  .btn-submit { height: auto; padding: 13px 0; }
}

/* ===== 无动画偏好 ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="auth-page">
  <!-- 品牌区 -->
  <div class="auth-brand-mobile">
    <div class="brand-icon-sm">武</div>
    <h1>武汉科技大学社区</h1>
    <p>连接每一位科大人</p>
  </div>

  <!-- 表单区 -->
  <div class="auth-form-wrap">
    <!-- Tab 切换 -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" id="registerTab" onclick="switchTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)" autocomplete="on">
      <div class="form-group">
        <label>学号</label>
        <div class="input-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <input type="text" id="loginId" placeholder="请输入学号" maxlength="12" required autocomplete="username" inputmode="numeric">
        </div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="input-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="loginPwd" placeholder="请输入密码" required autocomplete="current-password">
          <button type="button" class="pwd-toggle" onclick="togglePwd('loginPwd',this)" aria-label="显示密码">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="form-options">
        <label class="remember-me" for="rememberMe">
          <input type="checkbox" id="rememberMe" checked>
          <span class="checkbox-custom"></span>
          记住我
        </label>
      </div>
      <div id="loginError" class="form-error"></div>
      <button type="submit" class="btn-submit" id="loginBtn">
        <span class="btn-text">登录</span>
        <div class="spinner"></div>
      </button>
      <p class="auth-tip">还没有账号？<a href="#" onclick="switchTab('register');return false">立即注册</a></p>
    </form>

    <!-- 注册表单 -->
    <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)" autocomplete="off">
      <div class="form-row">
        <div class="form-group">
          <label>昵称</label>
          <div class="input-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="regName" placeholder="取个昵称" required maxlength="20" autocomplete="name">
          </div>
          <div class="field-error" id="regNameError"></div>
        </div>
        <div class="form-group">
          <label>学号</label>
          <div class="input-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            <input type="text" id="regStuId" placeholder="10位学号" maxlength="12" required autocomplete="username" inputmode="numeric">
          </div>
          <div class="field-error" id="regStuIdError"></div>
        </div>
      </div>

      <div class="form-group">
        <label>所属校区</label>
        <div class="campus-selector">
          <label class="campus-option">
            <input type="radio" name="campus" value="青山校区" required>
            <div class="campus-card">
              <span class="campus-icon">🏫</span>
              <div class="campus-info">
                <div class="campus-name">青山校区</div>
                <div class="campus-desc">理工科 · 主校区</div>
              </div>
              <span class="campus-check">✓</span>
            </div>
          </label>
          <label class="campus-option">
            <input type="radio" name="campus" value="黄家湖校区">
            <div class="campus-card">
              <span class="campus-icon">🌿</span>
              <div class="campus-info">
                <div class="campus-name">黄家湖校区</div>
                <div class="campus-desc">新校区 · 医学部</div>
              </div>
              <span class="campus-check">✓</span>
            </div>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>所在学院</label>
        <div class="input-wrap" onclick="openBottomSheet('college')" style="cursor:pointer">

<script src="core.js"></script>
<script>
// ============================================================
// 学院-专业映射
// ============================================================
var MAJOR_MAP = {

  "机械自动化学院":["机械工程","机械设计制造及其自动化","测控技术与仪器","电气工程及其自动化","工业工程","机器人工程","智能制造工程"],
  "计算机科学与技术学院":["计算机科学与技术","软件工程","网络工程","信息安全","人工智能","数据科学与大数据技术","物联网工程"],
  "信息科学与工程学院":["电子信息工程","通信工程","电子科学与技术","光电信息科学与工程","微电子科学与工程","生物医学工程"],
  "化学工程与技术学院":["化学工程与工艺","应用化学","环境工程","生物工程","制药工程","化工安全工程"],
  "城市建设学院":["土木工程","建筑环境与能源应用工程","给排水科学与工程","城乡规划","建筑学","工程管理","工程造价","交通工程"],
  "资源与环境工程学院":["采矿工程","矿物加工工程","地质工程","环境科学","地理信息科学","安全工程","测绘工程","土地资源管理"],
  "医学院":["临床医学","预防医学","护理学","药学","医学影像技术","医学检验技术","口腔医学","康复治疗学"],
  "管理学院":["工商管理","会计学","财务管理","市场营销","人力资源管理","物流管理","信息管理与信息系统","电子商务","工程管理（管）"],
  "艺术与设计学院":["视觉传达设计","环境设计","产品设计","公共艺术","绘画","工业设计","环境设计（环艺）"],
  "外国语学院":["英语","翻译","德语","法语","商务英语"],
  "理学院":["数学与应用数学","统计学","应用物理学","应用化学","工程力学"],
  "法学与经济学院":["法学","国际经济与贸易","金融学","投资学","劳动社会保障"],
  "汽车与交通工程学院":["车辆工程","交通运输","交通设备与控制工程","新能源汽车工程","智能车辆工程"],
  "生命科学与健康学院":["生物技术","生物信息学","生物工程（生）","化学（生）"],
  "体育学院":["社会体育指导与管理","运动训练","休闲体育"],
  "马克思主义学院":["思想政治教育","哲学"],
  "国际教育学院":["汉语国际教育","国际教育"]
};

var GRADE_OPTIONS = ["大一","大二","大三","大四","研一","研二","研三","博一","博二","博三","博四"];

// ============================================================
// Tab 切换
// ============================================================
function switchTab(tab) {
  var loginForm = document.getElementById('loginForm');
  var registerForm = document.getElementById('registerForm');
  var loginTab = document.getElementById('loginTab');
  var registerTab = document.getElementById('registerTab');

  var currentForm = tab === 'login' ? registerForm : loginForm;
  var targetForm = tab === 'login' ? loginForm : registerForm;

  currentForm.classList.add('hidden');
  targetForm.classList.remove('hidden');
  targetForm.classList.add('animating');
  setTimeout(function() { targetForm.classList.remove('animating'); }, 300);

  loginTab.classList.toggle('active', tab === 'login');
  registerTab.classList.toggle('active', tab === 'register');
  document.getElementById('loginError').textContent = '';
  document.getElementById('registerError').textContent = '';
  clearFieldErrors();
}

// ============================================================
// 密码显示/隐藏
// ============================================================
function togglePwd(id, btn) {
  var inp = document.getElementById(id);
  var isPassword = inp.type === 'password';
  inp.type = isPassword ? 'text' : 'password';
  btn.querySelector('.eye-open').style.display = isPassword ? 'none' : 'block';
  btn.querySelector('.eye-closed').style.display = isPassword ? 'block' : 'none';
}

// ============================================================
// 底部选择器弹窗
// ============================================================
var _sheetType = '';
var _sheetSelected = '';
var _sheetItems = [];

function openBottomSheet(type) {
  _sheetType = type;
  var title = document.getElementById('bottomSheetTitle');
  var list = document.getElementById('bottomSheetList');
  var overlay = document.getElementById('bottomSheetOverlay');

  if (type === 'college') {
    title.textContent = '选择学院';
    _sheetItems = Object.keys(MAJOR_MAP).sort();
    _sheetSelected = document.getElementById('regCollege').value;
  } else if (type === 'major') {
    var college = document.getElementById('regCollege').value;
    if (!college) { showToast('请先选择学院', 'warn'); return; }
    title.textContent = '选择专业';
    _sheetItems = MAJOR_MAP[college] || [];
    _sheetSelected = document.getElementById('regMajor').value;
    document.getElementById('majorWrap').style.opacity = '1';
  } else if (type === 'grade') {
    title.textContent = '选择年级';
    _sheetItems = GRADE_OPTIONS;
    _sheetSelected = document.getElementById('regGrade').value;
  }

  list.innerHTML = _sheetItems.map(function(item) {
    return '<div class="bottom-sheet-item' + (item === _sheetSelected ? ' selected' : '') + '" onclick="selectSheetItem(this,\'' + item.replace(/'/g, "\\'") + '\')">' +
      '<span>' + item + '</span><span class="check">✓</span></div>';
  }).join('');

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function selectSheetItem(el, val) {
  document.querySelectorAll('.bottom-sheet-item').forEach(function(i) { i.classList.remove('selected'); });
  el.classList.add('selected');
  _sheetSelected = val;
}

function confirmBottomSheet() {
  if (!_sheetSelected) { closeBottomSheet(); return; }

  if (_sheetType === 'college') {
    document.getElementById('regCollege').value = _sheetSelected;
    document.getElementById('regCollegeDisplay').value = _sheetSelected;
    // 清空专业
    document.getElementById('regMajor').value = '';
    document.getElementById('regMajorDisplay').value = '';
    document.getElementById('regMajorHint').classList.remove('hidden');
  } else if (_sheetType === 'major') {
    document.getElementById('regMajor').value = _sheetSelected;
    document.getElementById('regMajorDisplay').value = _sheetSelected;
    document.getElementById('regMajorHint').classList.add('hidden');
  } else if (_sheetType === 'grade') {
    document.getElementById('regGrade').value = _sheetSelected;
    document.getElementById('regGradeDisplay').value = _sheetSelected;
  }
  closeBottomSheet();
}

function closeBottomSheet() {
  document.getElementById('bottomSheetOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ============================================================
// 校区卡片选中
// ============================================================
document.querySelectorAll('.campus-option input').forEach(function(radio) {
  radio.addEventListener('change', function() {
    document.querySelectorAll('.campus-card').forEach(function(c) { c.classList.remove('selected'); });
    this.closest('.campus-option').querySelector('.campus-card').classList.add('selected');
  });
});

// ============================================================
// 实时表单校验
// ============================================================
function clearFieldErrors() {
  document.querySelectorAll('.field-error').forEach(function(el) { el.textContent = ''; el.classList.remove('show'); });
  document.querySelectorAll('.input-wrap').forEach(function(w) { w.classList.remove('has-error', 'has-success'); });
}

function setFieldError(id, msg) {
  var el = document.getElementById(id);
  var wrap = el ? el.closest('.input-wrap') : null;
  if (el) { el.textContent = msg; el.classList.toggle('show', !!msg); }
  if (wrap) { wrap.classList.toggle('has-error', !!msg); wrap.classList.toggle('has-success', !msg); }
}

// 学号校验
document.getElementById('regStuId')?.addEventListener('blur', function() {
  var val = this.value.trim();
  if (val && !/^\d{10}$/.test(val)) setFieldError('regStuIdError', '请输入10位有效学号');
  else { setFieldError('regStuIdError', ''); this.closest('.input-wrap').classList.toggle('has-success', !!val); }
});

// 昵称校验
document.getElementById('regName')?.addEventListener('blur', function() {
  var val = this.value.trim();
  if (val.length > 20) setFieldError('regNameError', '昵称不能超过20个字符');
  else if (val.length > 0 && val.length < 2) setFieldError('regNameError', '昵称至少需要2个字符');
  else { setFieldError('regNameError', ''); this.closest('.input-wrap').classList.toggle('has-success', !!val); }
});

// 密码校验
document.getElementById('regPwd')?.addEventListener('input', function() {
  var val = this.value;
  if (val && val.length < 6) { setFieldError('regPwdError', '密码长度不能少于6位'); }
  else { setFieldError('regPwdError', ''); this.closest('.input-wrap').classList.toggle('has-success', !!val); }
  // 联动确认密码
  var pwd2 = document.getElementById('regPwd2');
  if (pwd2 && pwd2.value && pwd2.value !== val) setFieldError('regPwd2Error', '两次输入密码不一致');
  else if (pwd2 && pwd2.value) setFieldError('regPwd2Error', '');
});

// 确认密码校验
document.getElementById('regPwd2')?.addEventListener('blur', function() {
  var pwd = document.getElementById('regPwd').value;
  if (this.value && this.value !== pwd) setFieldError('regPwd2Error', '两次输入密码不一致');
  else { setFieldError('regPwd2Error', ''); this.closest('.input-wrap').classList.toggle('has-success', !!this.value); }
});

// ============================================================
// 登录处理
// ============================================================
async function handleLogin(e) {
  e.preventDefault();
  var stuId = document.getElementById('loginId').value.trim();
  var pwd = document.getElementById('loginPwd').value;
  var errEl = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');

  if (!stuId || !pwd) { errEl.textContent = '请填写学号和密码'; return; }

  btn.classList.add('loading'); btn.disabled = true;

  if (typeof CloudSync !== 'undefined' && CloudSync.enabled) {
    try {
      var result = await CloudSync.login(stuId, pwd);
      if (result && !result.error && result.token) {
        localStorage.setItem('wkust_currentUser', stuId);
        saveRemember(stuId, pwd);
        if (result.user) {
          var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
          users[stuId] = Object.assign({}, result.user, { password: pwd });
          localStorage.setItem('wkust_users', JSON.stringify(users));
        }
        await CloudSync.pullAll();
        var initStatus = await CloudSync.getInitStatus();
        if (initStatus && !initStatus.sampleInited) { initSampleData(); await CloudSync.pushAll(); }
        showAuthToast('登录成功！', function() { window.location.href = 'index.html'; });
        return;
      }
      if (result && result.error) {
        if (result.error.includes('未注册') || result.error.includes('密码错误')) {
          var localUsers = JSON.parse(localStorage.getItem('wkust_users') || '{}');
          var localUser = localUsers[stuId];
          if (localUser && localUser.password === pwd) {
            var regResult = await CloudSync.register({ stuId: stuId, name: localUser.name, password: pwd, campus: localUser.campus, college: localUser.college, major: localUser.major, grade: localUser.grade });
            if (regResult && regResult.token) {
              localStorage.setItem('wkust_currentUser', stuId);
              saveRemember(stuId, pwd);
              await CloudSync.pushAll();
              showAuthToast('登录成功！', function() { window.location.href = 'index.html'; });
              return;
            }
          }
        }
        errEl.textContent = result.error;
        btn.classList.remove('loading'); btn.disabled = false;
        return;
      }
    } catch(ex) {}
  }

  var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
  var user = users[stuId];
  if (!user) { errEl.textContent = '学号不存在，请先注册'; btn.classList.remove('loading'); btn.disabled = false; return; }
  if (user.password !== pwd) { errEl.textContent = '密码错误，请重试'; btn.classList.remove('loading'); btn.disabled = false; return; }

  localStorage.setItem('wkust_currentUser', stuId);
  saveRemember(stuId, pwd);
  showAuthToast('登录成功！', function() { window.location.href = 'index.html'; });
}

// ============================================================
// 注册处理
// ============================================================
async function handleRegister(e) {
  e.preventDefault();
  var errEl = document.getElementById('registerError');
  var btn = document.getElementById('registerBtn');

  var name = document.getElementById('regName').value.trim();
  var stuId = document.getElementById('regStuId').value.trim();
  var campus = document.querySelector('input[name="campus"]:checked')?.value;
  var college = document.getElementById('regCollege').value;
  var major = document.getElementById('regMajor').value;
  var grade = document.getElementById('regGrade').value;
  var pwd = document.getElementById('regPwd').value;
  var pwd2 = document.getElementById('regPwd2').value;

  var hasError = false;
  if (!name || name.length < 2) { setFieldError('regNameError', '昵称至少需要2个字符'); hasError = true; }
  if (name.length > 20) { setFieldError('regNameError', '昵称不能超过20个字符'); hasError = true; }
  if (!/^\d{10}$/.test(stuId)) { setFieldError('regStuIdError', '请输入10位有效学号'); hasError = true; }
  if (!campus) { errEl.textContent = '请选择所属校区'; hasError = true; }
  if (pwd.length < 6) { setFieldError('regPwdError', '密码长度不能少于6位'); hasError = true; }
  if (pwd !== pwd2) { setFieldError('regPwd2Error', '两次输入密码不一致'); hasError = true; }

  if (hasError) {
    var firstErr = document.querySelector('.input-wrap.has-error');
    if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  btn.classList.add('loading'); btn.disabled = true;

  if (typeof CloudSync !== 'undefined' && CloudSync.enabled) {
    try {
      var result = await CloudSync.register({ stuId: stuId, name: name, password: pwd, campus: campus, college: college, major: major, grade: grade });
      if (result && !result.error && result.token) {
        localStorage.setItem('wkust_currentUser', stuId);
        var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
        var colors = ['#E6F1FB:#185FA5','#EAF3DE:#3B6D11','#FBEAF0:#993556','#FAEEDA:#854F0B','#EEEDFE:#534AB7','#E6F9F5:#0D6B56'];
        var cp = colors[Math.floor(Math.random() * colors.length)].split(':');
        users[stuId] = { stuId: stuId, name: name, campus: campus, college: college, major: major, grade: grade, password: pwd, avatarBg: cp[0], avatarColor: cp[1], avatarText: name.charAt(0), joinTime: new Date().toLocaleDateString('zh-CN'), bio: '', followers: 0, following: 0, friends: [], pendingFriends: [] };
        localStorage.setItem('wkust_users', JSON.stringify(users));
        await CloudSync.pullAll();
        var initStatus = await CloudSync.getInitStatus();
        if (initStatus && !initStatus.sampleInited) { initSampleData(); await CloudSync.pushAll(); }
        showAuthToast('注册成功！🎉', function() { window.location.href = 'index.html'; });
        return;
      }
      if (result && result.error) { errEl.textContent = result.error; btn.classList.remove('loading'); btn.disabled = false; return; }
    } catch(ex) {}
  }

  var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
  if (users[stuId]) { errEl.textContent = '该学号已注册，请直接登录'; btn.classList.remove('loading'); btn.disabled = false; return; }

  var colors = ['#E6F1FB:#185FA5','#EAF3DE:#3B6D11','#FBEAF0:#993556','#FAEEDA:#854F0B','#EEEDFE:#534AB7','#E6F9F5:#0D6B56'];
  var cp = colors[Math.floor(Math.random() * colors.length)].split(':');
  users[stuId] = { stuId: stuId, name: name, campus: campus, college: college, major: major, grade: grade, password: pwd, avatarBg: cp[0], avatarColor: cp[1], avatarText: name.charAt(0), joinTime: new Date().toLocaleDateString('zh-CN'), bio: '', followers: 0, following: 0, friends: [], pendingFriends: [] };
  localStorage.setItem('wkust_users', JSON.stringify(users));
  localStorage.setItem('wkust_currentUser', stuId);
  showAuthToast('注册成功！🎉', function() { window.location.href = 'index.html'; });
}

// ============================================================
// Toast
// ============================================================
function showAuthToast(msg, cb, isError) {
  var t = document.createElement('div');
  t.className = 'auth-toast ' + (isError ? 'error' : 'success');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(function() { t.classList.add('show'); });
  setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); if (cb) cb(); }, 300); }, 1800);
}

// ============================================================
// 记住我
// ============================================================
function saveRemember(stuId, pwd) {
  var remember = document.getElementById('rememberMe');
  if (remember && remember.checked) {
    localStorage.setItem('wkust_remember', JSON.stringify({
      stuId: stuId, pwd: pwd,
      expire: Date.now() + 7 * 24 * 60 * 60 * 1000 // 7天有效期
    }));
  } else {
    localStorage.removeItem('wkust_remember');
  }
}
function loadRemember() {
  try {
    var saved = JSON.parse(localStorage.getItem('wkust_remember') || 'null');
    if (saved && saved.stuId) {
      // 检查是否过期
      if (saved.expire && Date.now() > saved.expire) {
        localStorage.removeItem('wkust_remember');
        return;
      }
      document.getElementById('loginId').value = saved.stuId;
      if (saved.pwd) document.getElementById('loginPwd').value = saved.pwd;
      document.getElementById('rememberMe').checked = true;
    }
  } catch(e) {}
}
loadRemember();

// ============================================================
// 已登录跳转
// ============================================================
(async function() {
  var cu = localStorage.getItem('wkust_currentUser');
  if (cu) {
    var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
    if (users[cu]) {
      if (typeof CloudSync !== 'undefined' && CloudSync.enabled && CloudSync.getToken()) {
        try { await CloudSync.pullAll(); } catch(e) {}
      }
      window.location.href = 'index.html';
    }
  }
})();
</script>
