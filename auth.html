// ============================================================
// 注册页 学院-专业 联动初始化
// ============================================================
(function initRegCollegeMajorCascade() {
  var collegeSelect = document.getElementById('regCollege');
  var majorSelect = document.getElementById('regMajor');
  var majorHint = document.getElementById('regMajorHint');

  if (!collegeSelect || !majorSelect) return;

  // 填充学院下拉选项
  var colleges = Object.keys(WUST_COLLEGE_MAJOR_MAP).sort();
  colleges.forEach(function(college) {
    var opt = document.createElement('option');
    opt.value = college;
    opt.textContent = college;
    collegeSelect.appendChild(opt);
  });

  // 根据选中学院更新专业下拉
  function updateMajors(collegeKey) {
    majorSelect.innerHTML = '<option value="">如：计算机科学与技术</option>';

    if (!collegeKey || !WUST_COLLEGE_MAJOR_MAP[collegeKey]) {
      majorSelect.disabled = true;
      majorHint.classList.remove('hidden');
      return;
    }

    majorSelect.disabled = false;
    majorHint.classList.add('hidden');

    var majors = WUST_COLLEGE_MAJOR_MAP[collegeKey];
    majors.forEach(function(major) {
      var opt = document.createElement('option');
      opt.value = major;
      opt.textContent = major;
      majorSelect.appendChild(opt);
    });
  }

  // 学院选择变化事件
  collegeSelect.addEventListener('change', function() {
    updateMajors(this.value);
    document.getElementById('registerError').textContent = '';
  });
})();

// 切换登录/注册
function switchAuthTab(tab) {
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('registerTab').classList.toggle('active', tab === 'register');
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
  document.getElementById('loginError').textContent = '';
  document.getElementById('registerError').textContent = '';
}

// 密码显示切换
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.style.opacity = isText ? '0.5' : '1';
}

// 校区选中高亮
document.querySelectorAll('.campus-option input').forEach(radio => {
  radio.addEventListener('change', function() {
    document.querySelectorAll('.campus-option .campus-card').forEach(c => c.classList.remove('selected'));
    this.closest('.campus-option').querySelector('.campus-card').classList.add('selected');
  });
});

// 登录处理
async function handleLogin(e) {
  e.preventDefault();
  const stuId = document.getElementById('loginId').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginError');

  // 先尝试云端登录
  if (CloudSync.enabled) {
    var result = await CloudSync.login(stuId, pwd);
    // 云端登录成功
    if (result && !result.error && result.token) {
      localStorage.setItem('wkust_currentUser', stuId);
      saveRemember(stuId, pwd);
      // 同时更新本地（服务器重启丢数据后可恢复）
      if (result.user) {
        const users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
        users[stuId] = Object.assign({}, result.user, { password: pwd });
        localStorage.setItem('wkust_users', JSON.stringify(users));
      }
      await CloudSync.pullAll();
      var initStatus = await CloudSync.getInitStatus();
      if (initStatus && !initStatus.sampleInited) {
        initSampleData();
        await CloudSync.pushAll();
      }
      showAuthToast('登录成功，欢迎回来 ' + (result.user?.name || '') + '！', () => {
        window.location.href = 'index.html';
      });
      return;
    }
    // 云端返回明确错误（学号未注册/密码错误等）
    if (result && result.error) {
      // 服务器说"未注册"，但本地有该用户 → 服务器重启丢数据了，自动恢复注册
      if (result.error.includes('未注册')) {
        var localUsers = JSON.parse(localStorage.getItem('wkust_users') || '{}');
        var localUser = localUsers[stuId];
        if (localUser && localUser.password === pwd) {
          var regResult = await CloudSync.register({
            stuId: stuId, name: localUser.name, password: pwd,
            campus: localUser.campus, college: localUser.college,
            major: localUser.major, grade: localUser.grade
          });
          if (regResult && regResult.token) {
            localStorage.setItem('wkust_currentUser', stuId);
            saveRemember(stuId, pwd);
            await CloudSync.pushAll();
            showAuthToast('登录成功，欢迎回来 ' + localUser.name + '！', () => {
              window.location.href = 'index.html';
            });
            return;
          }
        }
      }
      // 密码错误：本地有该用户记录 → 尝试从本地数据恢复（密码可能因之前的同步 bug 丢失）
      if (result.error.includes('密码错误')) {
        var localUsers = JSON.parse(localStorage.getItem('wkust_users') || '{}');
        var localUser = localUsers[stuId];
        if (localUser && localUser.name) {
          var regResult = await CloudSync.register({
            stuId: stuId, name: localUser.name, password: pwd,
            campus: localUser.campus, college: localUser.college,
            major: localUser.major, grade: localUser.grade
          });
          if (regResult && regResult.token) {
            localStorage.setItem('wkust_currentUser', stuId);
            saveRemember(stuId, pwd);
            await CloudSync.pushAll();
            showAuthToast('登录成功，欢迎回来 ' + localUser.name + '！', () => {
              window.location.href = 'index.html';
            });
            return;
          }
        }
      }
      errEl.textContent = result.error;
      return;
    }
        // result 为 null = 网络错误，回退本地登录
    console.warn('云端登录失败，回退本地模式');
  }

  // 纯本地登录（离线或 file:// 模式）
  const users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
  const user = users[stuId];

  if (!user) {
    errEl.textContent = '学号不存在，请先注册';
    return;
  }
  if (user.password !== pwd) {
    errEl.textContent = '密码错误，请重试';
    return;
  }

  localStorage.setItem('wkust_currentUser', stuId);
  saveRemember(stuId, pwd);
  showAuthToast('登录成功，欢迎回来 ' + user.name + '！', () => {
    window.location.href = 'index.html';
  });
}

// 注册处理
async function handleRegister(e) {
  e.preventDefault();
  const errEl = document.getElementById('registerError');

  const name = document.getElementById('regName').value.trim();
  if (!name || name.length < 2) { errEl.textContent = '昵称至少需要2个字符'; return; }
  if (name.length > 12) { errEl.textContent = '昵称最长12个字符'; return; }
  const stuId = document.getElementById('regStuId').value.trim();
  const campus = document.querySelector('input[name="campus"]:checked')?.value;
  const college = document.getElementById('regCollege').value;
  const major = document.getElementById('regMajor').value;
  const grade = document.getElementById('regGrade').value;
  const pwd = document.getElementById('regPwd').value;
  const pwd2 = document.getElementById('regPwd2').value;

  if (!campus) { errEl.textContent = '请选择所属校区'; return; }
  if (!/^\d{6,12}$/.test(stuId)) { errEl.textContent = '学号格式不正确（6-12位数字）'; return; }
  if (pwd !== pwd2) { errEl.textContent = '两次密码输入不一致'; return; }
  if (pwd.length < 6) { errEl.textContent = '密码至少6位'; return; }

  // 先尝试云端注册
  if (CloudSync.enabled) {
    var result = await CloudSync.register({
      stuId: stuId, name: name, password: pwd,
      campus: campus, college: college, major: major, grade: grade
    });
    // 云端注册成功
    if (result && !result.error && result.token) {
      localStorage.setItem('wkust_currentUser', stuId);
      // 同时保存到本地（服务器重启丢数据后可恢复）
      const users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
      const avatarColors = ['#E6F1FB:#185FA5','#EAF3DE:#3B6D11','#FBEAF0:#993556','#FAEEDA:#854F0B','#EEEDFE:#534AB7','#E6F9F5:#0D6B56'];
      const colorPair = avatarColors[Math.floor(Math.random() * avatarColors.length)].split(':');
      users[stuId] = {
        stuId: stuId, name: name, campus: campus, college: college, major: major, grade: grade,
        password: pwd, avatarBg: colorPair[0], avatarColor: colorPair[1], avatarText: name.charAt(0),
        joinTime: new Date().toLocaleDateString('zh-CN'), bio: '', followers: 0, following: 0,
        friends: [], pendingFriends: []
      };
      localStorage.setItem('wkust_users', JSON.stringify(users));
      await CloudSync.pullAll();
      var initStatus = await CloudSync.getInitStatus();
      if (initStatus && !initStatus.sampleInited) {
        initSampleData();
        await CloudSync.pushAll();
      }
      showAuthToast('注册成功！欢迎加入武汉科技大学社区 🎉', () => {
        window.location.href = 'index.html';
      });
      return;
    }
    // 云端返回明确错误（学号已注册等）
    if (result && result.error) {
      errEl.textContent = result.error;
      return;
    }
    // result 为 null = 网络错误，回退本地注册
    console.warn('云端注册失败，回退本地模式');
  }

  // 纯本地注册（离线或 file:// 模式）
  const users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
  if (users[stuId]) { errEl.textContent = '该学号已注册，请直接登录'; return; }

  const avatarColors = ['#E6F1FB:#185FA5','#EAF3DE:#3B6D11','#FBEAF0:#993556','#FAEEDA:#854F0B','#EEEDFE:#534AB7','#E6F9F5:#0D6B56'];
  const colorPair = avatarColors[Math.floor(Math.random() * avatarColors.length)].split(':');

  users[stuId] = {
    stuId, name, campus, college, major, grade, password: pwd,
    avatarBg: colorPair[0], avatarColor: colorPair[1],
    avatarText: name.charAt(0),
    joinTime: new Date().toLocaleDateString('zh-CN'),
    bio: '',
    followers: 0, following: 0,
    friends: [],
    pendingFriends: []
  };
  localStorage.setItem('wkust_users', JSON.stringify(users));
  localStorage.setItem('wkust_currentUser', stuId);

  showAuthToast('注册成功！欢迎加入武汉科技大学社区 🎉', () => {
    window.location.href = 'index.html';
  });
}

function showAuthToast(msg, cb) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#4F46E5;color:#fff;padding:12px 28px;border-radius:30px;font-size:14px;z-index:9999;box-shadow:0 4px 20px rgba(79,70,229,.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.remove(); if(cb) cb(); }, 1800);
}

// ---- 记住我功能 ----
function saveRemember(stuId, pwd) {
  var remember = document.getElementById('rememberMe');
  if (remember && remember.checked) {
    localStorage.setItem('wkust_remember', JSON.stringify({ stuId: stuId, pwd: pwd }));
  } else {
    localStorage.removeItem('wkust_remember');
  }
}
function loadRemember() {
  try {
    var saved = JSON.parse(localStorage.getItem('wkust_remember') || 'null');
    if (saved && saved.stuId) {
      document.getElementById('loginId').value = saved.stuId;
      if (saved.pwd) document.getElementById('loginPwd').value = saved.pwd;
      var cb = document.getElementById('rememberMe');
      if (cb) cb.checked = true;
    }
  } catch(e) {}
}

// 页面加载时自动填充
loadRemember();

// 如果已登录，跳转首页
(async function() {
  const cu = localStorage.getItem('wkust_currentUser');
  if (cu) {
    const users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
    if (users[cu]) {
      // 已登录，尝试从服务器同步最新数据
      if (CloudSync.enabled && CloudSync.getToken()) {
        await CloudSync.pullAll();
      }
      window.location.href = 'index.html';
    }
  }
})();
</script>
