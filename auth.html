<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>登录 / 注册 - 武科大社区</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --brand: #4F46E5; --brand-light: #818CF8; --brand-bg: #EEF2FF; --text-primary: #1F2937; --text-secondary: #374151; --text-muted: #6B7280; --border: #E5E7EB; --error: #EF4444; --success: #10B981; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .auth-page { display: flex; width: 100%; max-width: 960px; min-height: 580px; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,.25), 0 10px 20px rgba(0,0,0,.1); animation: cardFadeIn 0.5s ease; }
  @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* 左侧品牌区 */
  .auth-left { flex: 1; background: #4338CA; padding: 48px 40px; color: white; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .auth-left::before { content: ''; position: absolute; top: -40%; right: -20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 70%); border-radius: 50%; }
  .auth-left::after { content: ''; position: absolute; bottom: -30%; left: -10%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%); border-radius: 50%; }
  .auth-brand { position: relative; z-index: 1; }
  .brand-icon-lg { width: 56px; height: 56px; background: white; color: #4F46E5; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; margin-bottom: 24px; }
  .auth-brand h1 { font-size: 28px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
  .auth-brand p { font-size: 14px; opacity: .8; line-height: 1.6; margin-bottom: 32px; }
  .auth-features { display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 1; }
  .auth-feat { font-size: 14px; opacity: .85; display: flex; align-items: center; gap: 10px; transition: transform 0.2s ease; cursor: default; }
  .auth-feat:hover { transform: translateX(4px); opacity: 1; }
  .auth-feat span { font-size: 18px; width: 24px; text-align: center; }

  /* 右侧表单区 */
  .auth-right { width: 420px; background: white; padding: 48px 40px; display: flex; align-items: center; }
  .auth-card { width: 100%; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 2px solid #F3F4F6; position: relative; }
  .auth-tab { flex: 1; padding: 12px 0; text-align: center; font-size: 16px; font-weight: 600; color: #9CA3AF; border: none; background: none; cursor: pointer; transition: color 0.3s ease; position: relative; }
  .auth-tab.active { color: #4F46E5; }
  .auth-tab::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #4F46E5; border-radius: 1px; transform: scaleX(0); transition: transform 0.3s cubic-bezier(.22,1,.36,1); }
  .auth-tab.active::after { transform: scaleX(1); transition: transform 0.3s cubic-bezier(.22,1,.36,1); }
  .auth-tab:hover { color: #4F46E5; }

  /* 表单 */
  .auth-form { display: flex; flex-direction: column; gap: 18px; animation: formFadeIn 0.35s cubic-bezier(.22,1,.36,1) both; transition: opacity 0.2s ease, transform 0.2s ease; }
  .auth-form.hidden { display: none; animation: none; }
  .auth-form.fading-out { opacity: 0; transform: translateY(8px); pointer-events: none; }
  @keyframes formFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 13px; font-weight: 600; color: #374151; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-wrap svg { position: absolute; left: 12px; color: #9CA3AF; pointer-events: none; transition: color 0.2s; flex-shrink: 0; }
  .input-wrap input, .input-wrap select { width: 100%; padding: 11px 12px 11px 38px; border: 1.5px solid #E5E7EB; border-radius: 12px; font-size: 14px; outline: none; transition: border-color 0.25s, box-shadow 0.25s; color: #1F2937; background: white; }
  .input-wrap input:focus, .input-wrap select:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
  .input-wrap input:focus + svg, .input-wrap input:focus ~ svg { color: #4F46E5; }
  .input-wrap input.error { border-color: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,.08); }
  .input-wrap input.success { border-color: #10B981; }
  .input-wrap select { appearance: none; -webkit-appearance: none; cursor: pointer; padding-right: 32px; background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%239CA3AF' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; }
  .input-wrap select:disabled { opacity: .5; cursor: not-allowed; color: #9CA3AF; }

  /* 密码显示按钮 */
  .pwd-toggle { position: absolute; right: 8px; background: none; border: none; color: #9CA3AF; cursor: pointer; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color 0.2s, background 0.2s; }
  .pwd-toggle:hover { color: #4F46E5; background: #F3F4F6; }
  .pwd-toggle svg { transition: transform 0.2s ease; }

  /* 记住我 */
  .form-options { display: flex; align-items: center; justify-content: space-between; margin: -4px 0; }
  .remember-me { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #6B7280; cursor: pointer; user-select: none; padding: 4px 0; }
  .remember-me input[type="checkbox"] { width: 16px; height: 16px; accent-color: #4F46E5; cursor: pointer; border-radius: 4px; }

  /* 错误提示 */
  .form-error { font-size: 12px; color: #EF4444; min-height: 18px; line-height: 1.4; transition: opacity 0.2s; }
  .field-error { font-size: 11px; color: #EF4444; margin-top: 2px; display: none; }
  .field-error.show { display: block; }

  /* 提交按钮 */
  .btn-auth-submit { width: 100%; padding: 13px; background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.25s cubic-bezier(.22,1,.36,1); position: relative; overflow: hidden; }
  .btn-auth-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,70,229,.3); }
  .btn-auth-submit:active { transform: translateY(0); }
  .btn-auth-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-auth-submit .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-auth-submit.loading .btn-text { visibility: hidden; }
  .btn-auth-submit.loading .spinner { display: block; position: absolute; top: 50%; left: 50%; margin: -9px 0 0 -9px; }

  /* 底部提示 */
  .auth-tip { font-size: 13px; color: #6B7280; text-align: center; }
  .auth-tip a { color: #4F46E5; font-weight: 600; text-decoration: none; transition: color 0.2s; }
  .auth-tip a:hover { color: #4338CA; text-decoration: underline; }

  /* 校区选择 */
  .campus-selector { display: flex; gap: 12px; }
  .campus-option { flex: 1; cursor: pointer; }
  .campus-option input { display: none; }
  .campus-card { border: 2px solid #E5E7EB; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.25s cubic-bezier(.22,1,.36,1); text-align: center; }
  .campus-card:hover { border-color: #C7D2FE; background: #F5F3FF; }
  .campus-card.selected { border-color: #4F46E5; background: #EEF2FF; box-shadow: 0 0 0 3px rgba(79,70,229,.12); transform: scale(1.02); }
  .campus-card.selected .campus-name { color: #4F46E5; font-weight: 700; }
  .campus-icon { font-size: 24px; }
  .campus-name { font-size: 14px; font-weight: 600; color: #1F2937; }
  .campus-desc { font-size: 11px; color: #9CA3AF; }

  /* 行内布局 */
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .form-row .grade-group { flex: 0 0 100px; }

  /* 专业提示 */
  .reg-major-hint { font-size: 12px; color: #6B7280; font-weight: 500; margin-top: 2px; }
  .reg-major-hint.hidden { display: none; }

  /* Toast */
  .auth-toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: #4F46E5; color: white; padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 9999; box-shadow: 0 4px 20px rgba(79,70,229,.4); opacity: 0; transition: all 0.35s cubic-bezier(.22,1,.36,1); }
  .auth-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .auth-toast.error { background: #EF4444; box-shadow: 0 4px 20px rgba(239,68,68,.4); }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    body { padding: 0; align-items: stretch; }
    .auth-page { flex-direction: column; max-width: 100%; min-height: 100vh; border-radius: 0; }
    .auth-left { flex: none; padding: 40px 32px 32px; text-align: center; }
    .auth-left h1 { font-size: 24px; }
    .auth-left p { font-size: 13px; margin-bottom: 24px; }
    .auth-features { align-items: center; gap: 12px; }
    .auth-feat { font-size: 13px; }
    .auth-right { flex: 1; width: 100%; padding: 32px 24px; align-items: flex-start; overflow-y: auto; }
    .form-row { flex-direction: column; gap: 16px; }
    .campus-selector { flex-direction: column; }
    .input-wrap input, .input-wrap select { padding: 12px 12px 12px 38px; font-size: 16px; min-height: 48px; }
    .btn-auth-submit { padding: 14px; font-size: 16px; min-height: 48px; }
    .auth-right { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  }
  @media (max-width: 400px) {
    .auth-left { padding: 32px 20px 24px; }
    .auth-right { padding: 24px 16px; }
    .auth-brand h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="auth-page">
  <!-- 左侧品牌区 -->
  <div class="auth-left">
    <div class="auth-brand">
      <div class="brand-icon-lg">武</div>
      <h1>武汉科技大学<br>校园社区</h1>
      <p>连接每一位科大人，共建活力校园</p>
    </div>
    <div class="auth-features">
      <div class="auth-feat"><span>📚</span> 学术广场 · 知识共享</div>
      <div class="auth-feat"><span>🛍️</span> 二手集市 · 安全交易</div>
      <div class="auth-feat"><span>💼</span> 职业内推 · 校友资源</div>
      <div class="auth-feat"><span>⚽</span> 活动约伴 · 精彩生活</div>
    </div>
  </div>

  <!-- 右侧表单区 -->
  <div class="auth-right">
    <div class="auth-card">
      <!-- Tab切换 -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">登录</button>
        <button class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">注册</button>
      </div>

      <!-- 登录表单 -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)" autocomplete="on">
        <div class="form-group">
          <label>学号</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            <input type="text" id="loginId" placeholder="请输入学号" maxlength="12" required autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPwd" placeholder="请输入密码" required autocomplete="current-password">
            <button type="button" class="pwd-toggle" onclick="togglePwd('loginPwd', this)" aria-label="显示密码">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="form-options">
          <label class="remember-me" for="rememberMe">
            <input type="checkbox" id="rememberMe" checked> 记住我
          </label>
        </div>
        <div id="loginError" class="form-error"></div>
        <button type="submit" class="btn-auth-submit" id="loginBtn">
          <span class="btn-text">登录账号</span>
          <div class="spinner"></div>
        </button>
        <p class="auth-tip">还没有账号？<a href="#" onclick="switchAuthTab('register');return false">立即注册</a></p>
      </form>

      <!-- 注册表单 -->
      <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label>昵称</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="regName" placeholder="取个好听的昵称" required maxlength="20" autocomplete="name">
            </div>
            <div class="field-error" id="regNameError"></div>
          </div>
          <div class="form-group">
            <label>学号</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              <input type="text" id="regStuId" placeholder="10位学号" maxlength="12" required autocomplete="username">
            </div>
            <div class="field-error" id="regStuIdError"></div>
          </div>
        </div>

        <div class="form-group">
          <label>所属校区</label>
          <div class="campus-selector">
            <label class="campus-option">
              <input type="radio" name="campus" value="青山校区" required>
              <div class="campus-card">
                <span class="campus-icon">🏫</span>
                <span class="campus-name">青山校区</span>
                <span class="campus-desc">理工科 · 主校区</span>
              </div>
            </label>
            <label class="campus-option">
              <input type="radio" name="campus" value="黄家湖校区">
              <div class="campus-card">
                <span class="campus-icon">🌿</span>
                <span class="campus-name">黄家湖校区</span>
                <span class="campus-desc">新校区 · 医学部</span>
              </div>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>所在学院</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            <select id="regCollege" required>
              <option value="">请选择学院</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>专业与年级</label>
          <div class="form-row">
            <div class="input-wrap" style="flex:1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              <select id="regMajor" disabled required>
                <option value="">如：计算机科学与技术</option>
              </select>
            </div>
            <div class="input-wrap grade-group">
              <select id="regGrade" required>
                <option value="">年级</option>
                <option value="大一">大一</option>
                <option value="大二">大二</option>
                <option value="大三">大三</option>
                <option value="大四">大四</option>
                <option value="研一">研一</option>
                <option value="研二">研二</option>
                <option value="研三">研三</option>
                <option value="博一">博一</option>
                <option value="博二">博二</option>
                <option value="博三">博三</option>
                <option value="博四">博四</option>
              </select>
            </div>
          </div>
          <span class="reg-major-hint" id="regMajorHint">请先选择所在学院，再选择专业</span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>密码</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="regPwd" placeholder="至少6位" required minlength="6" autocomplete="new-password">
              <button type="button" class="pwd-toggle" onclick="togglePwd('regPwd', this)" aria-label="显示密码">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <div class="field-error" id="regPwdError"></div>
          </div>
          <div class="form-group">
            <label>确认密码</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="regPwd2" placeholder="再输一次" required minlength="6" autocomplete="new-password">
              <button type="button" class="pwd-toggle" onclick="togglePwd('regPwd2', this)" aria-label="显示密码">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <div class="field-error" id="regPwd2Error"></div>
          </div>
        </div>

        <div id="registerError" class="form-error"></div>
        <button type="submit" class="btn-auth-submit" id="registerBtn">
          <span class="btn-text">创建账号</span>
          <div class="spinner"></div>
        </button>
        <p class="auth-tip">已有账号？<a href="#" onclick="switchAuthTab('login');return false">直接登录</a></p>
      </form>
    </div>
  </div>
</div>

<script>
// ============================================================
// 学院-专业映射数据
// ============================================================
var WUST_COLLEGE_MAJOR_MAP = {
  "材料科学与工程学院":["材料科学与工程","材料物理","材料化学","冶金工程","无机非金属材料工程","能源与动力工程","金属材料工程"],
  "冶金与能源学院":["冶金工程","新能源科学与工程","储能科学与工程","资源循环科学与工程"],

// ============================================================
// Tab 切换（带动画）
// ============================================================
function switchAuthTab(tab) {
  var loginForm = document.getElementById('loginForm');
  var registerForm = document.getElementById('registerForm');
  var loginTab = document.getElementById('loginTab');
  var registerTab = document.getElementById('registerTab');

  var currentForm = tab === 'login' ? registerForm : loginForm;
  var targetForm = tab === 'login' ? loginForm : registerForm;

  // 淡出当前表单
  currentForm.classList.add('fading-out');

  setTimeout(function() {
    currentForm.classList.add('hidden');
    currentForm.classList.remove('fading-out');
    currentForm.style.opacity = '';
    currentForm.style.transform = '';

    // 淡入目标表单
    targetForm.classList.remove('hidden');
    targetForm.style.animation = 'none';
    targetForm.offsetHeight; // force reflow
    targetForm.style.animation = 'formFadeIn 0.35s cubic-bezier(.22,1,.36,1) both';
  }, 200);

  loginTab.classList.toggle('active', tab === 'login');
  registerTab.classList.toggle('active', tab === 'register');
  document.getElementById('loginError').textContent = '';
  document.getElementById('registerError').textContent = '';
  clearFieldErrors();
}

// ============================================================
// 密码显示/隐藏（睁眼/闭眼图标切换）
// ============================================================
function togglePwd(inputId, btn) {
  var inp = document.getElementById(inputId);
  var isPassword = inp.type === 'password';
  inp.type = isPassword ? 'text' : 'password';

  var eyeOpen = btn.querySelector('.eye-open');
  var eyeClosed = btn.querySelector('.eye-closed');
  if (isPassword) {
    eyeOpen.style.display = 'none';
    eyeClosed.style.display = 'block';
  } else {
    eyeOpen.style.display = 'block';
    eyeClosed.style.display = 'none';
  }
  // 旋转动画
  btn.style.transform = 'rotate(360deg)';
  setTimeout(function() { btn.style.transform = ''; }, 200);
}

// ============================================================
// 实时表单校验
// ============================================================
function clearFieldErrors() {
  document.querySelectorAll('.field-error').forEach(function(el) {
    el.textContent = '';
    el.classList.remove('show');
  });
  document.querySelectorAll('.input-wrap input').forEach(function(inp) {
    inp.classList.remove('error', 'success');
  });
}

function showFieldError(id, msg) {
  var el = document.getElementById(id);
  var wrap = el ? el.closest('.input-wrap') : null;
  if (el) {
    el.textContent = msg;
    el.classList.toggle('show', !!msg);
  }
  if (wrap) {
    var input = wrap.querySelector('input, select');
    if (input) {
      input.classList.toggle('error', !!msg);
      input.classList.toggle('success', !msg && input.value.trim() !== '');
    }
  }
}

// 学号实时校验
document.getElementById('regStuId')?.addEventListener('input', function() {
  var val = this.value.trim();
  if (val && !/^\d{10}$/.test(val)) {
    showFieldError('regStuIdError', '请输入10位有效学号');
    this.classList.add('error');
    this.classList.remove('success');
  } else if (val) {
    showFieldError('regStuIdError', '');
    this.classList.remove('error');
    this.classList.add('success');
  } else {
    showFieldError('regStuIdError', '');
    this.classList.remove('error', 'success');
  }
});

// 昵称实时校验
document.getElementById('regName')?.addEventListener('input', function() {
  var val = this.value.trim();
  if (val.length > 20) {
    showFieldError('regNameError', '昵称不能超过20个字符');
    this.classList.add('error');
    this.classList.remove('success');
  } else if (val.length > 0 && val.length < 2) {
    showFieldError('regNameError', '昵称至少需要2个字符');
    this.classList.add('error');
    this.classList.remove('success');
  } else if (val) {
    showFieldError('regNameError', '');
    this.classList.remove('error');
    this.classList.add('success');
  } else {
    showFieldError('regNameError', '');
    this.classList.remove('error', 'success');
  }
});

// 密码实时校验
document.getElementById('regPwd')?.addEventListener('input', function() {
  var val = this.value;
  if (val && val.length < 6) {
    showFieldError('regPwdError', '密码长度不能少于6位');
    this.classList.add('error');
    this.classList.remove('success');
  } else if (val) {
    showFieldError('regPwdError', '');
    this.classList.remove('error');
    this.classList.add('success');
    // 同时校验确认密码
    var pwd2 = document.getElementById('regPwd2');
    if (pwd2 && pwd2.value && pwd2.value !== val) {
      showFieldError('regPwd2Error', '两次输入密码不一致');
      pwd2.classList.add('error');
      pwd2.classList.remove('success');
    } else if (pwd2 && pwd2.value) {
      showFieldError('regPwd2Error', '');
      pwd2.classList.remove('error');
      pwd2.classList.add('success');
    }
  } else {
    showFieldError('regPwdError', '');
    this.classList.remove('error', 'success');
  }
});

// 确认密码实时校验
document.getElementById('regPwd2')?.addEventListener('input', function() {
  var pwd = document.getElementById('regPwd').value;
  var val = this.value;
  if (val && val !== pwd) {
    showFieldError('regPwd2Error', '两次输入密码不一致');
    this.classList.add('error');
    this.classList.remove('success');
  } else if (val) {
    showFieldError('regPwd2Error', '');
    this.classList.remove('error');
    this.classList.add('success');
  } else {
    showFieldError('regPwd2Error', '');
    this.classList.remove('error', 'success');
  }
});

// ============================================================
// 学院-专业联动
// ============================================================
(function() {
  var collegeSelect = document.getElementById('regCollege');
  var majorSelect = document.getElementById('regMajor');
  var majorHint = document.getElementById('regMajorHint');
  if (!collegeSelect || !majorSelect) return;

  var colleges = Object.keys(WUST_COLLEGE_MAJOR_MAP).sort();
  colleges.forEach(function(college) {
    var opt = document.createElement('option');
    opt.value = college;
    opt.textContent = college;
    collegeSelect.appendChild(opt);
  });

  function updateMajors(collegeKey) {
    majorSelect.innerHTML = '<option value="">如：计算机科学与技术</option>';
    if (!collegeKey || !WUST_COLLEGE_MAJOR_MAP[collegeKey]) {
      majorSelect.disabled = true;
      majorHint.classList.remove('hidden');
      return;
    }
    majorSelect.disabled = false;
    majorHint.classList.add('hidden');
    WUST_COLLEGE_MAJOR_MAP[collegeKey].forEach(function(major) {
      var opt = document.createElement('option');
      opt.value = major;
      opt.textContent = major;
      majorSelect.appendChild(opt);
    });
  }

  collegeSelect.addEventListener('change', function() {
    updateMajors(this.value);
    document.getElementById('registerError').textContent = '';
  });
})();

// ============================================================
// 登录处理
// ============================================================
async function handleLogin(e) {
  e.preventDefault();
  var stuId = document.getElementById('loginId').value.trim();
  var pwd = document.getElementById('loginPwd').value;
  var errEl = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');

  if (!stuId || !pwd) { errEl.textContent = '请填写学号和密码'; return; }

  // 按钮加载状态
  btn.classList.add('loading');
  btn.disabled = true;

  // 先尝试云端登录
  if (typeof CloudSync !== 'undefined' && CloudSync.enabled) {
    try {
      var result = await CloudSync.login(stuId, pwd);
      if (result && !result.error && result.token) {
        localStorage.setItem('wkust_currentUser', stuId);
        saveRemember(stuId, pwd);
        if (result.user) {
          var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
          users[stuId] = Object.assign({}, result.user, { password: pwd });
          localStorage.setItem('wkust_users', JSON.stringify(users));
        }
        await CloudSync.pullAll();
        var initStatus = await CloudSync.getInitStatus();
        if (initStatus && !initStatus.sampleInited) { initSampleData(); await CloudSync.pushAll(); }
        showAuthToast('登录成功，欢迎回来 ' + (result.user?.name || '') + '！', function() { window.location.href = 'index.html'; });
        return;
      }
      if (result && result.error) {
        // 尝试本地恢复
        if (result.error.includes('未注册') || result.error.includes('密码错误')) {
          var localUsers = JSON.parse(localStorage.getItem('wkust_users') || '{}');
          var localUser = localUsers[stuId];
          if (localUser && localUser.password === pwd) {
            var regResult = await CloudSync.register({ stuId: stuId, name: localUser.name, password: pwd, campus: localUser.campus, college: localUser.college, major: localUser.major, grade: localUser.grade });
            if (regResult && regResult.token) {
              localStorage.setItem('wkust_currentUser', stuId);
              saveRemember(stuId, pwd);
              await CloudSync.pushAll();
              showAuthToast('登录成功，欢迎回来 ' + localUser.name + '！', function() { window.location.href = 'index.html'; });
              return;
            }
          }
        }
        errEl.textContent = result.error;
        btn.classList.remove('loading');
        btn.disabled = false;
        return;
      }
    } catch(ex) {}
  }

  // 本地登录
  var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
  var user = users[stuId];
  if (!user) { errEl.textContent = '学号不存在，请先注册'; btn.classList.remove('loading'); btn.disabled = false; return; }
  if (user.password !== pwd) { errEl.textContent = '密码错误，请重试'; btn.classList.remove('loading'); btn.disabled = false; return; }

  localStorage.setItem('wkust_currentUser', stuId);
  saveRemember(stuId, pwd);
  showAuthToast('登录成功，欢迎回来 ' + user.name + '！', function() { window.location.href = 'index.html'; });
}

// ============================================================
// 注册处理
// ============================================================
async function handleRegister(e) {
  e.preventDefault();
  var errEl = document.getElementById('registerError');
  var btn = document.getElementById('registerBtn');

  var name = document.getElementById('regName').value.trim();
  var stuId = document.getElementById('regStuId').value.trim();
  var campus = document.querySelector('input[name="campus"]:checked')?.value;
  var college = document.getElementById('regCollege').value;
  var major = document.getElementById('regMajor').value;
  var grade = document.getElementById('regGrade').value;
  var pwd = document.getElementById('regPwd').value;
  var pwd2 = document.getElementById('regPwd2').value;

  // 全量校验
  var hasError = false;
  if (!name || name.length < 2) { showFieldError('regNameError', '昵称至少需要2个字符'); hasError = true; }
  if (name.length > 20) { showFieldError('regNameError', '昵称不能超过20个字符'); hasError = true; }
  if (!/^\d{10}$/.test(stuId)) { showFieldError('regStuIdError', '请输入10位有效学号'); hasError = true; }
  if (!campus) { errEl.textContent = '请选择所属校区'; hasError = true; }
  if (pwd.length < 6) { showFieldError('regPwdError', '密码长度不能少于6位'); hasError = true; }
  if (pwd !== pwd2) { showFieldError('regPwd2Error', '两次输入密码不一致'); hasError = true; }

  if (hasError) {
    // 滚动到第一个错误
    var firstErr = document.querySelector('.input-wrap input.error');
    if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  // 云端注册
  if (typeof CloudSync !== 'undefined' && CloudSync.enabled) {
    try {
      var result = await CloudSync.register({ stuId: stuId, name: name, password: pwd, campus: campus, college: college, major: major, grade: grade });
      if (result && !result.error && result.token) {
        localStorage.setItem('wkust_currentUser', stuId);
        var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
        var colors = ['#E6F1FB:#185FA5','#EAF3DE:#3B6D11','#FBEAF0:#993556','#FAEEDA:#854F0B','#EEEDFE:#534AB7','#E6F9F5:#0D6B56'];
        var cp = colors[Math.floor(Math.random() * colors.length)].split(':');
        users[stuId] = { stuId: stuId, name: name, campus: campus, college: college, major: major, grade: grade, password: pwd, avatarBg: cp[0], avatarColor: cp[1], avatarText: name.charAt(0), joinTime: new Date().toLocaleDateString('zh-CN'), bio: '', followers: 0, following: 0, friends: [], pendingFriends: [] };
        localStorage.setItem('wkust_users', JSON.stringify(users));
        await CloudSync.pullAll();
        var initStatus = await CloudSync.getInitStatus();
        if (initStatus && !initStatus.sampleInited) { initSampleData(); await CloudSync.pushAll(); }
        showAuthToast('注册成功！欢迎加入武科大社区 🎉', function() { window.location.href = 'index.html'; });
        return;
      }
      if (result && result.error) { errEl.textContent = result.error; btn.classList.remove('loading'); btn.disabled = false; return; }
    } catch(ex) {}
  }

  // 本地注册
  var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');
  if (users[stuId]) { errEl.textContent = '该学号已注册，请直接登录'; btn.classList.remove('loading'); btn.disabled = false; return; }

  var colors = ['#E6F1FB:#185FA5','#EAF3DE:#3B6D11','#FBEAF0:#993556','#FAEEDA:#854F0B','#EEEDFE:#534AB7','#E6F9F5:#0D6B56'];
  var cp = colors[Math.floor(Math.random() * colors.length)].split(':');
  users[stuId] = { stuId: stuId, name: name, campus: campus, college: college, major: major, grade: grade, password: pwd, avatarBg: cp[0], avatarColor: cp[1], avatarText: name.charAt(0), joinTime: new Date().toLocaleDateString('zh-CN'), bio: '', followers: 0, following: 0, friends: [], pendingFriends: [] };
  localStorage.setItem('wkust_users', JSON.stringify(users));
  localStorage.setItem('wkust_currentUser', stuId);
  showAuthToast('注册成功！欢迎加入武科大社区 🎉', function() { window.location.href = 'index.html'; });
}

// ============================================================
// Toast 提示
// ============================================================
function showAuthToast(msg, cb, isError) {
  var t = document.createElement('div');
  t.className = 'auth-toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(function() { t.classList.add('show'); });
  setTimeout(function() {
    t.classList.remove('show');
    setTimeout(function() { t.remove(); if (cb) cb(); }, 350);
  }, 1800);
}

// ============================================================
// 记住我
// ============================================================
function saveRemember(stuId, pwd) {
  var remember = document.getElementById('rememberMe');
  if (remember && remember.checked) {
    localStorage.setItem('wkust_remember', JSON.stringify({ stuId: stuId, pwd: pwd }));
  } else {
    localStorage.removeItem('wkust_remember');
  }
}
function loadRemember() {
  try {
    var saved = JSON.parse(localStorage.getItem('wkust_remember') || 'null');
    if (saved && saved.stuId) {
      document.getElementById('loginId').value = saved.stuId;
      if (saved.pwd) document.getElementById('loginPwd').value = saved.pwd;
      var cb = document.getElementById('rememberMe');
      if (cb) cb.checked = true;
    }
  } catch(e) {}
}
loadRemember();

(async function() {
  var cu = localStorage.getItem('wkust_currentUser');
  if (cu) {
    var users = JSON.parse(localStorage.getItem('wkust_users') || '{}');

      if (typeof CloudSync !== 'undefined' && CloudSync.enabled && CloudSync.getToken()) {
        try { await CloudSync.pullAll(); } catch(e) {}
      }
      window.location.href = 'index.html';
    }
  }
})();
